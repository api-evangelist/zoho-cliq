  - name: BotMessage
    module: bots
    description: 'Payload for sending a message from a bot. At least one of <code>text</code>,
      <code>card</code>, or <code>slides</code> must be provided.

      To target specific recipients, include <code>user_ids</code> (comma-separated
      user IDs, up to 100) or set <code>broadcast: true</code> to reach all subscribers.

      '
