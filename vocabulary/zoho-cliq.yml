      For group chat, send `chat_type: group_chat` with `user_ids` and `title`.

      '
  - name: v3-bulk-chat-update-request
    module: chats
    description: "Supports two payload modes, selected by the <code>operation</code>\
      \ field:\n<ul>\n  <li><b>Mark as read</b> (<code>read_status_update</code>):\
      \ Set <code>operation</code> to <code>read_status_update</code>, <code>read_status</code>\
      \ to <code>read</code>, and provide a <code>chats</code> array with each chat's\
      \ <code>chat_id</code> and <code>last_message_id</code>. Returns <code>200 OK</code>.</li>\n\
      \  <li><b>Clear unread</b> (<code>clear_unread</code>): Set <code>operation</code>\
      \ to <code>clear_unread</code> and provide a <code>chat_ids</code> array. Returns\
      \ <code>204 No Content</code>.</li>\n</ul>\n"
