  - name: CardObject
    module: messagecards
    description: "Defines the interactive card to be rendered inside the message.\
      \ The <code>theme</code> field\nselects the card type and determines which fields\
      \ are required. For a quick reference of\nrequired and optional fields per theme,\
      \ see the <a href=\"#available-themes\"><b>Available Themes</b></a> table in\
      \ the overview above.\n<br><br>\n<b>Poll card fields</b>\n<ul>\n  <li><b>theme</b>\
      \ <code>string</code>: Must be <code>poll</code>.</li>\n  <li><b>title</b> <code>string</code>:\
      \ The poll question displayed at the top of the card. Maximum 200 characters.</li>\n\
      \  <li><b>options</b> <code>array</code>: List of voting choices. Minimum 2,\
      \ maximum 10 items.\n    <ul>\n      <li><b>options[].text</b> <code>string</code>:\
      \ Display label for the poll option. Maximum 100 characters.</li>\n    </ul>\n\
      \  </li>\n</ul>\n<b>Modern Inline card fields</b>\n<ul>\n  <li><b>theme</b>\
      \ <code>string</code>: Must be <code>modern-inline</code>.</li>\n  <li><b>title</b>\
      \ <code>string</code>: Card header text displayed at the top of the card. Maximum\
      \ 200 characters.</li>\n  <li><b>thumbnail</b> <code>string</code>: Optional.\
      \ Publicly accessible HTTPS URL of a thumbnail image shown in the card header.</li>\n\
      \  <li><b>sections</b> <code>array</code>: Optional. One or more labeled field\
      \ sections displayed in the card body. Each section groups related key-value\
      \ pairs under an optional heading.\n    <ul>\n      <li><b>sections[].title</b>\
      \ <code>string</code>: Optional section heading displayed above the fields.</li>\n\
      \      <li><b>sections[].fields</b> <code>array</code>: List of key-value field\
      \ pairs.\n        <ul>\n          <li><b>fields[].title</b> <code>string</code>:\
      \ Field label (key).</li>\n          <li><b>fields[].value</b> <code>string</code>:\
      \ Field value.</li>\n        </ul>\n      </li>\n    </ul>\n  </li>\n  <li><b>buttons</b>\
      \ <code>array</code>: Optional. Action buttons rendered at the bottom of the\
      \ card. Maximum 5. See <b>Button fields</b> below.</li>\n</ul>\n<b>Prompt card\
      \ fields</b>\n<ul>\n  <li><b>theme</b> <code>string</code>: Must be <code>prompt</code>.</li>\n\
      \  <li><b>title</b> <code>string</code>: The prompt question or alert text presented\
      \ to the user. Maximum 200 characters.</li>\n  <li><b>buttons</b> <code>array</code>:\
      \ Action buttons for the user to respond with. Minimum 1, maximum 5. See <b>Button\
      \ fields</b> below.</li>\n</ul>\n<b>Button fields</b> (applicable to <code>modern-inline</code>\
      \ and <code>prompt</code> themes)\n<ul>\n  <li><b>buttons[].label</b> <code>string</code>:\
      \ Text displayed on the button. Maximum 30 characters.</li>\n  <li><b>buttons[].action.type</b>\
      \ <code>string</code>: Determines how Cliq handles the button click.\n    <ul>\n\
      \      <li><code>open.url</code>: Opens a URL in the user's default browser.\
      \ Requires <code>action.data.web</code> (string).</li>\n      <li><code>invoke.function</code>:\
      \ Triggers a Cliq Function by name. Requires <code>action.data.name</code> (string).</li>\n\
      \      <li><code>system.api</code>: Calls a Cliq internal system API. Requires\
      \ <code>action.data.api</code> (string).</li>\n      <li><code>invoke.bot</code>:\
      \ Sends a message to a bot. Requires <code>action.data.bot_name</code> and <code>action.data.message</code>.</li>\n\
      \      <li><code>preview.url</code>: Opens a URL inside a Cliq preview panel\
      \ without leaving the conversation. Requires <code>action.data.web</code> (string).</li>\n\
      \    </ul>\n  </li>\n  <li><b>buttons[].action.data</b> <code>object</code>:\
      \ The payload passed to the action handler. Expected fields depend on <code>action.type</code>\
      \ as listed above.</li>\n</ul>\n<b>Note:</b> To render supporting structured\
      \ content such as tables, lists, or labelled records alongside a card,\nuse\
      \ the top-level <code>slides</code> array in the message payload. <code>slides</code>\
      \ is independent of the <code>card</code> object\nand can be combined with any\
      \ card theme. For details on supported slide formats, see\n<a href=\"https://www.zoho.com/cliq/help/restapi/v3/#Message_Content\"\
      \ target=\"_blank\">Message Content</a>.\n"
  - name: CardButton
    module: messagecards
    description: An action button rendered inside a Message Card. When clicked by
      a user, the button executes the specified <code>action</code>.
  - name: MessageResponse
    module: messagecards
    description: Response returned after a message card is successfully posted.
  - name: Slides
    module: messagecards
    description: "An array of structured content blocks rendered below the card inside\
      \ the message.\n<code>slides</code> is a top-level field in the message payload\
      \ - it sits alongside\n<code>text</code> and <code>card</code>, and is <b>not</b>\
      \ nested inside <code>card</code>.\n<br><br>\nMultiple slide blocks can be included\
      \ in a single message, and they are rendered in the\norder they appear in the\
      \ array. <code>slides</code> is most commonly paired with the\n<code>modern-inline</code>\
      \ card theme to display supporting data such as tables, lists,\nor labelled\
      \ records alongside the card header, but it is compatible with all card themes.\n\
      <br><br>\nEach slide block requires a <code>type</code> field that determines\
      \ how the content is rendered,\nan optional <code>title</code> heading, and\
      \ a <code>data</code> payload whose structure\ndepends on the slide type.\n\
      <br><br>\n<b>Supported slide types</b>\n<table style=\"border-collapse: collapse;\
      \ width: 100%; font-family: inherit;\">\n  <tr>\n    <th style=\"padding: 8px;\
      \ text-align: left; border: 1px solid #ddd; font-family: inherit;\">Type</th>\n\
      \    <th style=\"padding: 8px; text-align: left; border: 1px solid #ddd; font-family:\
      \ inherit;\">Renders</th>\n    <th style=\"padding: 8px; text-align: left; border:\
      \ 1px solid #ddd; font-family: inherit;\"><code>data</code> structure</th>\n\
      \  </tr>\n  <tr>\n    <td style=\"padding: 8px; border: 1px solid #ddd;\"><a\
      \ href=\"https://www.zoho.com/cliq/help/restapi/v3/#table\" target=\"_blank\"\
      ><code>table</code></a></td>\n    <td style=\"padding: 8px; border: 1px solid\
      \ #ddd;\">A data table with column headers and rows.</td>\n    <td style=\"\
      padding: 8px; border: 1px solid #ddd;\">Object with <code>headers</code> (array\
      \ of strings) and <code>rows</code> (array of objects where each key maps to\
      \ a header).</td>\n  </tr>\n  <tr>\n    <td style=\"padding: 8px; border: 1px\
      \ solid #ddd;\"><a href=\"https://www.zoho.com/cliq/help/restapi/v3/#list\"\
      \ target=\"_blank\"><code>list</code></a></td>\n    <td style=\"padding: 8px;\
      \ border: 1px solid #ddd;\">A bulleted list of items.</td>\n    <td style=\"\
      padding: 8px; border: 1px solid #ddd;\">Array of strings, each representing\
      \ one list item.</td>\n  </tr>\n  <tr>\n    <td style=\"padding: 8px; border:\
      \ 1px solid #ddd;\"><a href=\"https://www.zoho.com/cliq/help/restapi/v3/#label\"\
      \ target=\"_blank\"><code>label</code></a></td>\n    <td style=\"padding: 8px;\
      \ border: 1px solid #ddd;\">Key-value pairs in a definition-list style.</td>\n\
      \    <td style=\"padding: 8px; border: 1px solid #ddd;\">Array of objects, each\
      \ with <code>label</code> (string) and <code>value</code> (string).</td>\n \
      \ </tr>\n  <tr>\n    <td style=\"padding: 8px; border: 1px solid #ddd;\"><a\
      \ href=\"https://www.zoho.com/cliq/help/restapi/v3/#image\" target=\"_blank\"\
      ><code>images</code></a></td>\n    <td style=\"padding: 8px; border: 1px solid\
      \ #ddd;\">One or more inline images.</td>\n    <td style=\"padding: 8px; border:\
      \ 1px solid #ddd;\">Array of publicly accessible HTTPS image URL strings.</td>\n\
      \  </tr>\n  <tr>\n    <td style=\"padding: 8px; border: 1px solid #ddd;\"><a\
      \ href=\"https://www.zoho.com/cliq/help/restapi/v3/#text\" target=\"_blank\"\
      ><code>text</code></a></td>\n    <td style=\"padding: 8px; border: 1px solid\
      \ #ddd;\">A plain or formatted text block.</td>\n    <td style=\"padding: 8px;\
      \ border: 1px solid #ddd;\">A string containing the text content to display.</td>\n\
      \  </tr>\n</table>\n<br>\nFor full details on each slide type, including field-level\
      \ descriptions and payload examples,\nrefer to <a href=\"https://www.zoho.com/cliq/help/restapi/v3/#Message_Content\"\
      \ target=\"_blank\">Message Content</a>.\n"
