  /functions/{FUNCTION_ID}/handlers:
    post:
      summary: Create a handler for a specific function
      operationId: createFunctionHandler
      description: |
        <a id="createFunctionHandler"></a>
        <p>
          Create a handler for a function. Handlers define the logic that executes when a user triggers the UI element (button click, form submit, widget interaction, etc.).
        </p>
        <p>
          The field you provide depends on the function's execution type:
        </p>
        <ul>
          <li><b>Deluge function</b>: Provide the <code>script</code> field with the Deluge source code to execute when the handler fires.</li>
          <li><b>Webhook function</b>: Provide the <code>permissions</code> field - an array of data attributes your server needs to receive in the webhook payload. Do not pass <code>script</code> for Webhook functions.</li>
        </ul>
        <p><b>Permissions availability by handler type</b></p>
        <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
          <tr>
            <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Handler</th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>chat</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>message</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>user</code></th>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>button_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>form_submit_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>form_change_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>form_dynamic_select_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>form_view_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>widget_button_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
        </table>
        <p>Note: <code>attachments</code> and <code>location</code> are not available for any function handler type. Only <code>chat</code>, <code>message</code>, and <code>user</code> are applicable.</p>
