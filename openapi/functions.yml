                    task_field.put("name", "task_name");
                    task_field.put("label", "Task Name");
                    task_field.put("type", "text");
                    task_field.put("mandatory", true);
                    fields.add(task_field);
                    due_field = Map();
                    due_field.put("name", "due_date");
