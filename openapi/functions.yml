openapi: 3.0.0
info:
  title: Functions
  version: '3.0'
  description: |
    <p>Functions are reusable, UI-triggered components in Zoho Cliq that execute when a user interacts with a UI element - clicking a button in a message, submitting or changing a form, or clicking a button inside a widget. Unlike commands or message actions which are user-text-driven, functions are driven by structured UI interactions.</p> <p>For more information, refer to the <b><a href="https://www.zoho.com/cliq/help/platform/functions.html" target="_blank">Functions Help Documentation</a></b>.</p> <p><b>Function Types</b></p> <p>The <code>function_type</code> field determines which UI trigger activates the function:</p> <table style="border-collapse: collapse; width: 100%;">
      <tr>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd;">function_type</th>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd;">Trigger</th>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>button</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Triggered when a user clicks a button inside a chat message.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Triggered by form interactions - view (render), field change, dynamic select, and submit events.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>widget_button</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Triggered when a user clicks a button rendered inside a Cliq widget.</td>
      </tr>
    </table> <p><b>Function Handlers</b></p> <p>Each function supports one or more handlers based on its type. Handlers define the logic executed at each stage of the UI interaction:</p> <table style="border-collapse: collapse; width: 100%;">
      <tr>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd;">Handler</th>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd;">Applicable function_type</th>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd;">Description</th>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>button_handler</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>button</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Executes when a button in a message is clicked.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form_view_handler</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Renders the form UI when a user navigates to the form's permalink URL.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form_submit_handler</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Executes when the user submits the form.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form_change_handler</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Executes when a field value changes within the form.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form_dynamic_select_handler</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>form</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Populates dynamic dropdown options within a form field.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>widget_button_handler</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>widget_button</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Executes when a button inside a Cliq widget is clicked.</td>
      </tr>
    </table> <p><b>What can you do with the Functions API?</b></p> <p>With the Functions API, you can programmatically create and manage functions, configure their handlers (Deluge scripts or webhook permissions), update function configurations, and retrieve function details - all without using the Cliq Developer console.</p> <p>Each function has an <code>execution_type</code> that defines how handlers run when a UI element is triggered. The Functions API supports two execution types:</p> <p id="deluge-functions"><b>Deluge Functions (default)</b><br> Handler logic is written in Deluge and runs entirely within Zoho's platform. No external server is required.</p> <ul>
      <li>If <code>execution_type</code> is not specified, it defaults to <code>deluge</code>.</li>
      <li>Handler logic is defined using the <code>script</code> field when creating or updating handlers.</li>
      <li>Suitable for teams building UI-driven automations entirely within the Zoho platform.</li>
    </ul> <p id="webhook-functions"><b>Webhook Functions</b><br> When a UI element is interacted with, Zoho Cliq sends an HTTP POST request to your <code>execution_url</code>. Your server processes the event and returns a response that Cliq renders back to the user.</p> <ul>
      <li>To create a Webhook function, set <code>execution_type</code> to <code>webhook</code> and provide the <code>execution_url</code>.</li>
      <li>Handler permissions (<code>chat</code>, <code>message</code>, <code>user</code>) control which data attributes are included in the webhook payload. Note: <code>location</code> and <code>attachments</code> are not available for function handlers.</li>
      <li>Ideal for functions that need to integrate with external systems or require custom server-side processing.</li>
    </ul>
externalDocs:
  description: Find out more about Zoho Cliq Platform APIs
  url: https://www.zoho.com/cliq/help/platform/getting-started-with-cliq-platform.html
servers:
  - url: https://cliq.zoho.com/api/v3
    description: Zoho Cliq US DC
tags:
  - name: Functions
    description: Functions Module
paths:
  /functions:
    post:
      summary: Create a new function
      operationId: create_a_new_function
      description: |
        <a id="create_a_new_function"></a>
        <p>
          Create a new Function in the Cliq platform. Functions are reusable UI-triggered components that execute when a user clicks a button, submits a form, or interacts with a widget button. The <code>function_type</code> determines the UI trigger.
        </p>
        <p>
          Functions support two execution types:
        </p>
        <ul>
          <li><b>Deluge</b> (default): Handler logic runs on Zoho's platform via Deluge scripts. Best for UI interactions within the Zoho ecosystem - approvals, form submissions, inline actions.</li>
          <li><b>Webhook</b>: When a UI element is interacted with, Cliq sends a POST request to your <code>execution_url</code>. Your server processes the event and returns a response that Cliq renders back to the user. Supports <code>chat</code>, <code>message</code>, and <code>user</code> permissions.</li>
        </ul>
        <p>
          Pass <code>execution_type: "webhook"</code> and a valid <code>execution_url</code> to create a Webhook function. If <code>execution_type</code> is omitted, it defaults to <code>deluge</code>.
        </p>
        <br>
        <p>
          <b>Threshold limit</b>: 10 requests per min per user<br>
          Maximum API calls allowed within one minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>Cooldown period applied after threshold exhaustion.<br>
        </p>
        <details style="margin:16px 0 8px 0; border:1px solid rgba(148,163,184,0.5); border-radius:8px; font-family:inherit;" ontoggle="this.querySelector('.err-toggle-hint').textContent=this.open?'Click to collapse':'Click to expand'">
          <summary style="cursor:pointer; padding:11px 16px; font-weight:600; background:rgba(148,163,184,0.1); list-style:none; display:flex; align-items:center; gap:8px; user-select:none; border-radius:8px;">
            <span style="display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:rgba(239,68,68,0.15); border-radius:50%; font-size:12px; font-weight:700; color:#ef4444; flex-shrink:0;">!</span>
            Possible Error Codes
            <span class="err-toggle-hint" style="margin-left:auto; font-weight:400; opacity:0.45; font-size:0.8em; letter-spacing:0.01em;">Click to expand</span>
          </summary>
          <div style="padding:14px 16px 16px 16px;">
            <div style="border-radius:6px; border:1px solid rgba(148,163,184,0.35);">
              <table style="border-collapse:collapse; width:100%; font-family:inherit; font-size:0.9em;">
                <thead>
                  <tr>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); border-right:1px solid rgba(148,163,184,0.35); font-weight:600; width:45%;">Error Code</th>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); font-weight:600; width:55%;">Description</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">function_creation_limit_exceeded</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">Organization has reached the maximum number of functions.</td>
                  </tr>
                  <tr style="background:rgba(148,163,184,0.05);">
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">function_name_already_exists</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">A function with this name already exists.</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 18px; border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">invalid_inputs</span></td>
                    <td style="padding:10px 18px;">Request body validation failed.</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div style="background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.4); border-left:4px solid #f59e0b; padding:12px 16px; border-radius:0 6px 6px 0; margin-top:14px; overflow:hidden;">
              <b style="color:#d97706; font-size:0.88em; display:block; margin-bottom:6px;">Error Response Format</b>
              <p style="margin:0 0 8px 0; font-size:0.85em; opacity:0.75;">When an error occurs, the API returns a JSON response in this format:</p>
              <code style="display:block; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:8px 12px; border-radius:4px; font-size:0.75em; word-break:break-all;">{"message": "A human-readable description of the error.", "code": "error_code"}</code>
              <p style="margin:8px 0 0 0; font-size:0.85em; opacity:0.75;">where <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">code</code> is the error identifier (as listed above) and <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">message</code> is a human-readable explanation of what went wrong.</p>
            </div>
          </div>
        </details>
      parameters: []
      requestBody:
        description: Creates a function. Provide `name`, `description`, and `function_type`. Set `execution_type` to `webhook` and include `execution_url` for a Webhook function.
        required: true
        content:
          application/json:
            examples:
              button_function_deluge:
                summary: Deluge button function
                value:
                  name: ApproveRequest
                  description: Handles approval button clicks in messages
                  function_type: button
                  execution_type: deluge
              button_function_webhook:
                summary: Webhook button function
                value:
                  name: ApproveExpense
                  description: Forwards approval clicks to external HR system
                  function_type: button
                  execution_type: webhook
                  execution_url: https://api.yourcompany.com/cliq/functions/handler
              form_function:
                summary: Form function
                value:
                  name: SubmitFeedback
                  description: Processes feedback form submissions from users
                  function_type: form
              widget_button_function:
                summary: Widget button function
                value:
                  name: RefreshWidget
                  description: Handles button clicks inside widgets
                  function_type: widget_button
            schema:
              $ref: '#/components/schemas/v3-function-create'
      responses:
        '200':
          description: Function created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionResponse'
              examples:
                button_function_deluge:
                  summary: Deluge button function response
                  value:
                    url: /api/v3/functions
                    type: function
                    data:
                      name: ApproveRequest
                      id: '53719000002124011'
                      function_type: button
                      handlers:
                        - type: button_handler
                      creator:
                        name: James
                        id: '65113112'
                      execution_type: deluge
                      status: enabled
                      type: custom
                      description: Handles approval button clicks in messages
                      scope: personal
                button_function_webhook:
                  summary: Webhook button function response
                  value:
                    url: /api/v3/functions
                    type: function
                    data:
                      name: ApproveExpense
                      id: '53719000002124014'
                      function_type: button
                      handlers:
                        - type: button_handler
                      creator:
                        name: James
                        id: '65113112'
                      execution_type: webhook
                      execution_url: https://api.yourcompany.com/cliq/functions/handler
                      status: enabled
                      type: custom
                      description: Forwards approval clicks to external HR system
                      scope: personal
                form_function:
                  summary: Form function response
                  value:
                    url: /api/v3/functions
                    type: function
                    data:
                      name: SubmitFeedback
                      id: '53719000002124012'
                      function_type: form
                      handlers:
                        - type: form_submit_handler
                      creator:
                        name: James
                        id: '65113112'
                      execution_type: deluge
                      status: enabled
                      type: custom
                      description: Processes feedback form submissions from users
                      scope: personal
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Functions.CREATE
      tags:
        - Functions
    get:
      summary: List all functions
      operationId: list_all_functions
      description: |
        Retrieve a paginated list of all functions defined by the authenicated user.
        <br><br>
        <p>
          <b>Threshold limit</b>: 30 requests per min per user<br>
          Maximum API calls allowed within one minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>Cooldown period applied after threshold exhaustion.<br>
        </p>
      parameters:
        - name: next_token
          in: query
          description: Token for fetching the next page of results. Omit this parameter to retrieve the first page.
          required: false
          schema:
            type: string
        - name: sync_token
          in: query
          description: Token for incremental synchronization. Provide the <code>sync_token</code> value from a previous response to retrieve only functions that were created or updated since that response was generated.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: |
            Maximum number of functions to return per page.<br>
            <b>Default</b>: 20<br>
            <b>Maximum</b>: 50
          required: false
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: List of functions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionListResponse'
              example:
                url: /api/v3/functions
                next_token: NTB8LTF8NTM3MTkwMDAwMDAyNDUwMTE=
                type: function
                sync_token: NTB8MTc3NzQzMjg2NjI1MXw1MzcxOTAwMDAwMjEyNDAxMQ==
                data:
                  - name: createTask
                    id: '53719000002124011'
                    function_type: button
                    handlers:
                      - type: button_handler
                    creator:
                      name: James
                      id: '65113112'
                    execution_type: deluge
                    status: enabled
                    type: custom
                    description: Creates a task in integrated system
                    scope: personal
                  - name: SubmitFeedback
                    id: '53719000002124012'
                    function_type: form
                    handlers:
                      - type: form_submit_handler
                    creator:
                      name: James
                      id: '65113112'
                    execution_type: deluge
                    status: enabled
                    type: custom
                    description: Processes feedback form submissions from users
                    scope: personal
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Functions.READ
      tags:
        - Functions
  /functions/{FUNCTION_ID}:
    patch:
      summary: Update an existing function
      operationId: update_an_existing_function
      description: |
        Update the configuration (name and description) of an existing function.<br>
        To modify the function's handler logic, use the <a href="/cliq/help/restapi/v3/functions/#updateFunctionHandler">handler-level endpoints</a>.
        <p>
          For <b>Webhook functions</b>, you can also update the <code>execution_url</code> independently at any time to redirect all handler events to a new server endpoint.
        </p>
        <br>
        <p>
          <b>Threshold limit</b>: 10 requests per min per user<br>
          Maximum API calls allowed within one minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>Cooldown period applied after threshold exhaustion.<br>
        </p>
        <details style="margin:16px 0 8px 0; border:1px solid rgba(148,163,184,0.5); border-radius:8px; font-family:inherit;" ontoggle="this.querySelector('.err-toggle-hint').textContent=this.open?'Click to collapse':'Click to expand'">
          <summary style="cursor:pointer; padding:11px 16px; font-weight:600; background:rgba(148,163,184,0.1); list-style:none; display:flex; align-items:center; gap:8px; user-select:none; border-radius:8px;">
            <span style="display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:rgba(239,68,68,0.15); border-radius:50%; font-size:12px; font-weight:700; color:#ef4444; flex-shrink:0;">!</span>
            Possible Error Codes
            <span class="err-toggle-hint" style="margin-left:auto; font-weight:400; opacity:0.45; font-size:0.8em; letter-spacing:0.01em;">Click to expand</span>
          </summary>
          <div style="padding:14px 16px 16px 16px;">
            <div style="border-radius:6px; border:1px solid rgba(148,163,184,0.35);">
              <table style="border-collapse:collapse; width:100%; font-family:inherit; font-size:0.9em;">
                <thead>
                  <tr>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); border-right:1px solid rgba(148,163,184,0.35); font-weight:600; width:45%;">Error Code</th>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); font-weight:600; width:55%;">Description</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">function_not_found</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">Function with the specified ID was not found.</td>
                  </tr>
                  <tr style="background:rgba(148,163,184,0.05);">
                    <td style="padding:10px 18px; border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">function_name_already_exists</span></td>
                    <td style="padding:10px 18px;">Another function with this name already exists.</td>
                  </tr>
                </tbody>
              </table>
            </div>
