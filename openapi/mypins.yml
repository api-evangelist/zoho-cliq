    delete:
      summary: Remove pinned chats across chat folders
      operationId: removeChatsAcrossCategories
      description: |
        Remove specific pinned chats from all chat folders in one request. Provide the list of chat IDs to unpin those chats from every folder they are pinned in.<br><br>This is a bulk operation that can be used when a chat is no longer relevant and needs to be removed from multiple folders at once.
