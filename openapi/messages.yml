openapi: 3.0.0
info:
  title: Messages
  description: |
    The Messages API is essential for communication within Zoho Cliq, allowing you to send, retrieve, and manage messages across chats, channels, and bots.<br><br>Whether you're creating automated workflows, custom integrations, or engaging messaging experiences, the v3 Messages API provides developers with precise control over every aspect of message delivery and management.
    <br><br><b>Key Capabilities:</b><br>
    With the latest version (v3) of the Messages API, you can:
    <ul>
    <li><b>Post Messages:</b> Send messages directly to a chat, broadcast them to a channel, or interact with a bot-each with specific operations designed for clear and predictable routing.</li>
    <li><b>Retrieve & Search:</b> Fetch messages from specific conversations or search across chats using keywords, participants, or message metadata.</li>
    <li><b>Actions:</b> Forward messages to other participants, delete multiple messages in bulk, and keep conversations clean and relevant.</li>
    </ul>
  contact: {}
  version: 1.0.0
externalDocs:
  description: Find out more about Zoho Cliq APIs V2
  url: https://www.zoho.com/cliq/help/restapi/v2/
servers:
  - url: https://cliq.zoho.com/api/v3
    description: Zoho Cliq US DC
tags:
  - name: messages
    description: Messages Module
paths:
  /chats/{CHAT_ID}/messagess:
    delete:
      summary: Delete multiple messages
      operationId: deleteMultipleMessagesV3
      description: |
        Deletes up to 25 messages in a chat in a single request. Returns a per-message result indicating success or failure for each ID.<br><br>
        Admins deleting messages on behalf of other users must supply a <b>reason</b>(an optional <b>comment</b>) can also be provided.
        <br><br>
        <p>
          <b>Threshold limit</b>: 50 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>Wait time before consecutive API requests.<br>
        </p>
        <details style="margin:16px 0 8px 0; border:1px solid rgba(148,163,184,0.5); border-radius:8px; font-family:inherit;" ontoggle="this.querySelector('.err-toggle-hint').textContent=this.open?'Click to collapse':'Click to expand'">
          <summary style="cursor:pointer; padding:11px 16px; font-weight:600; background:rgba(148,163,184,0.1); list-style:none; display:flex; align-items:center; gap:8px; user-select:none; border-radius:8px;">
            <span style="display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:rgba(239,68,68,0.15); border-radius:50%; font-size:12px; font-weight:700; color:#ef4444; flex-shrink:0;">!</span>
            Possible Error Codes
            <span class="err-toggle-hint" style="margin-left:auto; font-weight:400; opacity:0.45; font-size:0.8em; letter-spacing:0.01em;">Click to expand</span>
          </summary>
          <div style="padding:14px 16px 16px 16px;">
            <div style="border-radius:6px; border:1px solid rgba(148,163,184,0.35);">
              <table style="border-collapse:collapse; width:100%; font-family:inherit; font-size:0.9em;">
                <thead>
                  <tr>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); border-right:1px solid rgba(148,163,184,0.35); font-weight:600; width:45%;">Error Code</th>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); font-weight:600; width:55%;">Description</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">message_delete_limit_exceeded</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">You can only delete up to 25 messages at once.</td>
                  </tr>
                  <tr style="background:rgba(148,163,184,0.05);">
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">invalid_parameters</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">The message_ids parameter is invalid or empty.</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">invalid_delete_reason</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">The provided reason for deletion is not valid.</td>
                  </tr>
                  <tr style="background:rgba(148,163,184,0.05);">
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">access_denied</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">You do not have permission to delete one or more of the selected messages.</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">message_delete_timeout</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">The time limit to delete one or more of these messages has expired.</td>
                  </tr>
                  <tr style="background:rgba(148,163,184,0.05);">
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2); border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">message_not_found</span></td>
                    <td style="padding:10px 18px; border-bottom:1px solid rgba(148,163,184,0.2);">Requested message could not be found.</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 18px; border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">chat_not_found</span></td>
                    <td style="padding:10px 18px;">The requested chat does not exist or you are not a participant.</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div style="background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.4); border-left:4px solid #f59e0b; padding:12px 16px; border-radius:0 6px 6px 0; margin-top:14px; overflow:hidden;">
              <b style="color:#d97706; font-size:0.88em; display:block; margin-bottom:6px;">Error Response Format</b>
              <p style="margin:0 0 8px 0; font-size:0.85em; opacity:0.75;">When an error occurs, the API returns a JSON response in this format:</p>
              <code style="display:block; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:8px 12px; border-radius:4px; font-size:0.75em; word-break:break-all;">{"message": "A human-readable description of the error.", "code": "error_code"}</code>
              <p style="margin:8px 0 0 0; font-size:0.85em; opacity:0.75;">where <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">code</code> is the error identifier (as listed above) and <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">message</code> is a human-readable explanation of what went wrong.</p>
            </div>
          </div>
        </details>
      parameters:
        - name: CHAT_ID
          in: path
          required: true
          schema:
            type: string
          example: CHAT_ID
          description: The unique identifier of the chat. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
        - name: message_ids
          in: query
          required: true
          schema:
            type: string
          description: |
            Comma-separated list of message IDs to delete.<br>
            <b>Maximum of 25 IDs allowed.</b>
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum:
              - irrelevant_information
              - obscene_content
              - others
          description: |
            Reason for deletion when an admin is deleting messages on behalf of other users.<br>
            <b>Allowed values:</b><br>
            <ul>
              <li><code>irrelevant_information</code>: The message contains information that is no longer relevant.</li>
              <li><code>obscene_content</code>: The message contains inappropriate or offensive content.</li>
              <li><code>others</code>: Any other reason not covered by the above options.</li>  
            </ul>
        - name: comment
          in: query
          required: false
          schema:
            type: string
            maxLength: 250
          description: |
            Optional comment providing additional context for the deletion reason when an admin is deleting messages on behalf of other users.<br>
            <b>Maximum length</b>: 250 characters.
      responses:
        '200':
          description: The request was successfully completed. Returns a per-message result.
          content:
            application/json:
              examples:
                all_success:
                  summary: All messages deleted successfully
                  value:
                    type: message.delete_result
                    data:
                      - id: '1773813859592_51531973059'
                        status: success
                      - id: '1773813860210_51531973060'
                        status: success
                      - id: '1773813861300_51531973061'
                        status: success
                partial_failure:
                  summary: Partial success - one message failed
                  value:
                    type: message.delete_result
                    data:
                      - id: '1773813859592_51531973059'
                        status: success
                      - id: '1773813860210_51531973060'
                        status: success
                      - id: '1773813861300_51531973061'
                        status: failed
                        error:
                          code: access_denied
                          message: You do not have permission to delete this message.
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: message.delete_result
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                          enum:
                            - success
                            - failed
                        error:
                          type: object
                          properties:
                            code:
                              type: string
                            message:
                              type: string
        '400':
          description: Bad Request.
          content:
            application/json:
              examples:
                limit_exceeded:
                  summary: Too many message IDs
                  value:
                    code: message_delete_limit_exceeded
                    message: You can only delete up to 25 messages at once.
                invalid_params:
                  summary: Invalid or empty message_ids
                  value:
                    code: invalid_parameters
                    message: The message_ids parameter is invalid or empty.
                invalid_reason:
                  summary: Invalid delete reason
                  value:
                    code: invalid_delete_reason
                    message: The provided reason for deletion is not valid.
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              examples:
                access_denied:
                  summary: Permission denied
                  value:
                    code: access_denied
                    message: You do not have permission to delete one or more of the selected messages.
                delete_timeout:
                  summary: Delete time limit expired
                  value:
                    code: message_delete_timeout
                    message: The time limit to delete one or more of these messages has expired.
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
        '404':
          description: Not Found.
          content:
            application/json:
              examples:
                message_not_found:
                  summary: Message not found
                  value:
                    code: message_not_found
                    message: Requested message could not be found.
                chat_not_found:
                  summary: Chat not found
                  value:
                    code: chat_not_found
                    message: The requested chat does not exist or you are not a participant.
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Messages.DELETE
      tags:
        - messages
  /channelsbyname/{CHANNEL_UNIQUE_NAME}/messages:
    post:
      summary: Post message in a channel with CHANNEL_UNIQUE_NAME
      operationId: postMessageInChannelByChannelUniqueName
      description: |
        Use this API to post a message in a channel using its <b>CHANNEL_UNIQUE_NAME</b>.
        <br><br>
        You can also post a message using the following alternative endpoint:<br>
        <ul>
          <li><a href="#operation/postMessageInChannelByChannelId"><code>POST /channels/{CHANNEL_ID}/messages</code></a> - Use the <b>CHANNEL_ID</b> of the channel.</li>
        </ul>
        <br><br>  
        <p>
          <b>Threshold limit</b>: 50 requests per min per user<br>
          Number of API calls allowed within a minute.<br>
          This limit is per user, not per token — even if messages are sent using multiple OAuth tokens by the same user, all requests count toward this shared limit.<br><br>
          <b>Lock period</b>: 10 minutes<br>Wait time before consecutive API requests.<br>
        </p>
      parameters:
        - name: CHANNEL_UNIQUE_NAME
          in: path
          description: Unique name of the channel. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHANNEL_UNIQUE_NAME">CHANNEL_UNIQUE_NAME</a> in the Glossary page.
          required: true
          schema:
            type: string
          example: CHANNEL_UNIQUE_NAME
        - name: bot_unique_name
          in: query
          description: Use this parameter to send a message in a channel as a bot. Note that the bot should already be a participant in the channel.
          required: false
          schema:
            type: string
        - name: appkey
          in: query
          description: |
            Extension authentication key. Use this along with bot_unique_name when sending messages as an extension bot.
          required: false
          schema:
            type: string
        - name: mark_as_read
          in: query
          description: Use these APIs to mark the sent message as read for the user. By default, the message will be unread for the message posted by the user.
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/post-message-in-a-channel-request'
      responses:
        '200':
          description: The request was successfully completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/post-message-in-a-channel-response'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Webhooks.CREATE
      tags:
        - messages
  /channels/{CHANNEL_ID}/messages:
