openapi: 3.0.0
info:
  title: Mentions
  description: |
    <p>
      In Zoho Cliq, you can use mentions (by using @) to tag users and send notifications, even in muted channels. These mentions will appear in the "@" tab at the top of the bar.
      <br>
      When you include a mention in a message, it not only notifies the person or group referenced but also highlights it in the conversation. 
      <br><br> 
      To include different types of content, use the <code>slides</code> key. Any content you want to attach should be placed within the <code>slides</code> JSON object. The <code>slides</code> key is a JSON array that lets you include various textual and visual message payloads.
      <br><br> 
      You can use mentions to:
      <ul>
       <li>Notify a specific user.</li>
       <li>Reference a channel.</li>
       <li>Mention a team.</li>
       <li>Notify all participants in a channel using <b>@all</b>.</li>
       <li>Notify only available participants using <b>@available</b>.</li>
      </ul>
      Additionally, you can view the last 30 days of mentions in a dedicated tab.<br><br>
      Note: Message delivery will fail if the authenticated user does not have permission to use restricted mentions like <b>@all</b> or <b>@available</b> in the specified channel.
    </p>
  contact: {}
  version: 1.0.0
externalDocs:
  description: Find out more about Zoho Cliq APIs V2
  url: https://www.zoho.com/cliq/help/restapi/v2/
servers:
  - url: https://cliq.zoho.com/api/v3
    description: Zoho Cliq US DC
tags:
  - name: mentions
    description: Mentions Module
paths:
  /mentions:
    get:
      summary: Retrieve Mentions and Replies
      operationId: getMentions
      description: |
        Fetches a list of messages in which the authenticated user has been mentioned or replied to.<br><br>
        The results are returned in descending order (newest to oldest) and can be filtered using various query parameters such as time range, chat IDs, sender user IDs, and activity type (mentions or replies).<br><br>
        This endpoint allows users to easily track conversations that require their attention based on mentions and replies.
        <br><br>
        <p>
          <b>Threshold limit</b>: 30 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>Wait time before consecutive API requests.<br>
        </p>
      parameters:
        - name: from_time
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: |
            <ul>
              <li>Return mentions created after this epoch time (ms).</li>
              <li>By default, mentions from the last 30 days are returned.</li>
              <li>If both <code>from_time</code> and <code>to_time</code> are provided, the API will return mentions created within that time range.</li>
            </ul>
            <b>Example:</b> 1622217600000 (June 1, 2021 12:00:00 AM GMT).
        - name: to_time
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: |
            <ul> 
              <li>Return mentions created before this epoch time (ms).</li>
              <li>By default, mentions up to the current time are returned.</li>
              <li>If both <code>from_time</code> and <code>to_time</code> are provided, the API will return mentions created within that time range.</li>
            </ul>
            <b>Example:</b> 1624809600000 (July 1, 2021 12:00:00 AM GMT).  
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
          description: |
            Maximum number of mentions to return in the response.<br>
            <ul>
              <li>Default value is 25 if not specified.</li>
              <li>Maximum allowed value is 100.</li>
              <li>If the total number of mentions exceeds this limit, a pagination token will be provided in the response to fetch the next set of results.</li>
            </ul>
        - name: next_token
          in: query
          required: false
          schema:
            type: string
          description: |
            Pagination token to retrieve the next set of mentions when the total number exceeds the specified limit. This token is provided in the response when there are more mentions to fetch.
        - name: chid
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter mentions by a specific chat ID.<br>
            To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
        - name: chat_ids
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter mentions by multiple chat IDs (comma-separated, maximum 5).<br>
            Example: <code>chat_ids = CT_1207124854_60002085329,CT_17960055085329-T-12915799199</code><br>
            To learn how to retrieve these IDs, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
        - name: user_ids
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter mentions by sender user IDs (comma-separated, maximum 5).<br>
            Example: <code>user_ids = 60040396507,60040376665</code><br>
            To learn how to retrieve these IDs, see <a href="/cliq/help/restapi/v3/glossary/#USER_ID">USER_ID</a> in the Glossary page.
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - mentions
              - replies
              - all
            default: mentions
          description: |
            Filter results by activity type.<br>
            <ul>
              <li><code>mentions</code>: Returns messages where the user was mentioned.</li>
              <li><code>replies</code>: Returns messages where the user was replied to.</li>
              <li><code>all</code>: Returns both mentions and replies.</li>
            </ul>
            <b>Default</b>: mentions  
      responses:
        '200':
          description: Mentions retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-mentions-response'
        '400':
          description: Invalid query parameter value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mentions-error-response'
              example:
                code: INVALID_PARAMS
                message: Invalid query parameter value.
        '401':
          description: Missing or invalid authentication token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mentions-error-response'
              example:
                code: UNAUTHORIZED
                message: Missing or invalid authentication token.
        '500':
          description: Internal server error while fetching mentions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mentions-error-response'
              example:
                code: MENTIONS_FETCH_FAILED
                message: Internal server error while fetching mentions.
      security:
        - Cliq_Auth:
            - ZohoCliq.Chats.READ
      tags:
        - mentions
  /chats/{CHAT_ID}/messages:
    post:
      summary: Mentioning a User
      operationId: mentioningUser
      description: |
        To mention a user, use the syntax <b>{@zohoid}</b> or <b>{@email}</b>.<br><br>
        When you mention a user in any team-level or organization-level channel, the user will be notified. This syntax applies only to the <code>text</code> and <code>comments</code> fields of the payload.
        To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
      parameters:
        - name: CHAT_ID
          in: path
          required: true
          schema:
            type: string
          example: CHAT_ID
          description: Unique identifier of the chat where the message needs to be sent.
      requestBody:
        required: true
        content:
          application/json:
            examples:
              userid:
                summary: User mention with userID
                value:
                  text: Hey there {@userid}, please review the latest project updates
              email:
                summary: User mention with user email
                value:
                  text: Hey there {@scott.fisher@zylker.com}, please review the latest project updates
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: |
                    The text content of the message to be sent.<br>
                    <b>Maximum length</b>: 10,000 characters.
                  maxLength: 10000
                  example: Hi Team! Please find the sales performance chart for this quarter.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/empty-response'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Webhooks.CREATE
      tags:
        - mentions
  /chats/{CHAT_ID1}/messages:
    post:
      summary: Silent mentions
      x-display-path: /chats/{CHAT_ID}/messages
      x-virtual-endpoint: true
      x-note: |
        CHAT_ID1 is a documentation alias for CHAT_ID path parameter used in silentMentions operation. This alias is used to document the silent mention use case separately while keeping it under the same POST /chats/{CHAT_ID}/messages endpoint, because the actual API path does not change and only the message text syntax differs. The actual endpoint for silentMentions operation remains /chats/{CHAT_ID}/messages as specified in the paths object.
      operationId: silentMentions
      description: |
        Silent mentions allow you to reference a user in a conversation without triggering a notification.<br><br>
        Use the syntax <code>[User Name](zohoid:userid)</code> or <code>[User Name](mail:user_email)</code> to mention a user silently in any conversation. This will not notify the user. This format can also be used to mention a user in fields other than the <code>text</code> and <code>comments</code> keys.
      parameters:
        - name: CHAT_ID1
          in: path
          required: true
          schema:
            type: string
          example: CHAT_ID
          description: |
            Unique identifier of the chat where the message needs to be sent. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.<br><br>
            <b>Note:</b> <code>CHAT_ID1</code> is a documentation alias for <code>CHAT_ID</code>, used to document the "Silent mentions" use case separately while sharing the same <code>/chats/{CHAT_ID}/messages</code> endpoint, since the path is unchanged and only the message text syntax differs.
      requestBody:
        required: true
        content:
          application/json:
            examples:
              userid:
                summary: Silent mention with userID
                value:
                  text: Hey there [Scott Fisher](zohoid:873421), could you check the campaign details when you get a chance?
              email:
                summary: Silent mention with user email
                value:
                  text: Hey there [Scott Fisher](mail:scott.fisher@zylker.com), could you check the campaign details when you get a chance?
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: |
                    The text content of the message to be sent.<br>
                    <b>Maximum length</b>: 10,000 characters.
                  maxLength: 10000
                  example: Hi Team! Please find the sales performance chart for this quarter.
