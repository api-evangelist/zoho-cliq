    mention-entry:
      type: object
      properties:
        id:
          type: string
          description: Unique mention entry ID.
        status:
          type: string
          description: unread, read, or deleted.
          enum:
            - unread
            - read
            - deleted
        activity_type:
          type: string
          description: mentions or replies.
          enum:
            - mentions
            - replies
        chat:
          $ref: '#/components/schemas/mention-chat'
        message:
          $ref: '#/components/schemas/mention-message'
        mention:
          $ref: '#/components/schemas/mention-metadata'
    mention-chat:
      type: object
      properties:
        id:
          type: string
          description: Chat ID.
        title:
          type: string
          description: Chat or channel title.
        type:
          type: string
          description: channel, direct, group, bot, or thread.
          enum:
            - channel
            - direct
            - group
            - bot
            - thread
        channel_type:
          type: string
          description: open, closed, public, external, or team.
          enum:
            - open
            - closed
            - public
            - external
            - team
        channel_display_name:
          type: string
          description: Display name of the channel.
    mention-message:
      type: object
      properties:
        id:
          type: string
          description: Message ID.
        type:
          type: string
          description: text, file, audio, card, etc.
        time:
          type: string
          format: date-time
          description: <a href="https://en.wikipedia.org/wiki/ISO_8601">ISO 8601</a> timestamp.
        content:
          type: object
          description: Message content.
          additionalProperties: true
        sender:
          $ref: '#/components/schemas/mention-sender'
        replied_to:
          type: object
          description: Original message details if this is a reply.
          properties:
            id:
              type: string
            time:
              type: string
              format: date-time
            content:
              type: object
              additionalProperties: true
            sender:
              $ref: '#/components/schemas/mention-sender'
    mention-sender:
      type: object
      properties:
        id:
          type: string
          description: Sender ID.
        name:
          type: string
          description: Sender name.
    mention-metadata:
      type: object
      properties:
        recipient_id:
          type: string
          description: ID of the mentioned user.
        mentioned_users:
          type: array
          description: List of mentioned users or entities.
          items:
            $ref: '#/components/schemas/mentioned-user'
    mentioned-user:
      type: object
      properties:
        id:
          type: string
          description: User or entity ID.
        name:
          type: string
          description: Name.
        display_name:
          type: string
          description: Display name (for example, @John).
        type:
          type: string
          description: user, group, channel, bot, participants, or available.
          enum:
            - user
            - group
            - channel
            - bot
            - participants
            - available
    mentions-error-response:
      type: object
      properties:
        code:
          type: string
          description: Error code identifier.
          example: INVALID_PARAMS
        message:
          type: string
          description: Human-readable error message.
          example: Invalid query parameter value.
    empty-response:
      type: object
      description: Response returned when there is no content.
      properties:
        Response_Code:
          type: string
          example: 204 No response
  securitySchemes:
    Cliq_Auth:
      type: oauth2
      x-authorization-example: Bearer 1000.41d9xxxxxxxxxxxxxxxxxxxxxxxxc2d1.8fccxxxxxxxxxxxxxxxxxxxxxxxx125f
      flows:
        implicit:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          scopes:
            ZohoCliq.Chats.READ: Read Chats
            ZohoCliq.Webhooks.CREATE: Send messages
