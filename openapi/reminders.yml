  /reminders/edits:
    put:
      summary: Batch edit reminders
      operationId: batchEditRemindersV3
      description: |
        Reschedules multiple reminders in a single request. Use this to update the delivery time of several reminders at once, avoiding the need to make individual edit calls for each one.
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>
          Wait time before consecutive API requests.
        </p>
        <br><b>Note</b>: Use <code>reminder_id</code> (not <code>id</code>) as the key for each reminder object. Timezone is not a supported field in the request body, convert to epoch milliseconds in the desired timezone before sending.
        <br><br><b>Response status values</b><br>
        The top-level <code>status</code> field reflects the overall result of the batch operation across all submitted reminders.<br>
        <ul>
          <li><code>success</code>: All reminders in the batch were rescheduled successfully.</li>
          <li><code>partial</code>: One or more reminders failed while the rest succeeded. Check the individual <code>status</code> field inside each object in the <code>data</code> array to identify which ones failed.</li>
          <li><code>failure</code>: All reminders in the batch failed to reschedule.</li>
        </ul>
        Each object in the <code>data</code> array carries its own <code>status</code> and <code>reminder_id</code>, allowing you to handle successes and failures per reminder regardless of the overall batch outcome.<br>
