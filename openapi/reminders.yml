openapi: 3.0.0
info:
  title: Reminders
  description: |
    The Reminders API takes a significant leap forward with v3, enabling developers to attach time-based alerts to specific messages across any chat type - direct messages, group chats, or channels. With support for multi-participant assignment and flexible recurrence, it is well suited for building notification-driven and accountability-focused workflows.
    <br><br><b>Key Capabilities</b>
    <ul>
      <li><b>Get Reminders:</b> Retrieve all reminders associated with messages in a chat, spanning direct messages, group chats, and channels in a single query.</li>
      <li><b>Update Status:</b> Resolve a recurring reminder by marking it as completed across all its occurrences simultaneously.</li>
      <li><b>Trigger Notification:</b> Proactively push an immediate alert to all assignees of a reminder, without waiting for the scheduled trigger. Available exclusively for reminders assigned to other users.</li>
      <li><b>Batch Edit:</b> Reschedule multiple reminders in one operation by supplying reminder IDs alongside their updated epoch timestamps.</li>
    </ul>
    <br><b>Reminder Types</b>
    <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
      <tr>
        <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Type</th>
        <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Description</th>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;">One-time</td>
        <td style="padding: 8px; border: 1px solid #ddd;">Fires once at the specified time. Use batch edit to reschedule.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;">Recurring</td>
        <td style="padding: 8px; border: 1px solid #ddd;">Repeats on a defined schedule. Supports <code>apply_to: all_occurrences</code> for status updates.</td>
      </tr>
    </table>
    <br><b>Base URL Note</b><br>
    <ul>
      <li><b>GET Reminders</b>: <code>https://cliq.zoho.com/v3</code> (without <code>/api</code>)</li>
      <li><b>All other Reminders APIs</b>: <code>https://cliq.zoho.com/api/v3</code></li>
    </ul>
  contact: {}
  version: 1.0.0
externalDocs:
  description: Find out more about Zoho Cliq APIs V3
  url: https://www.zoho.com/cliq/help/restapi/v3/
servers:
  - url: https://cliq.zoho.com/api/v3
    description: Zoho Cliq US DC
tags:
  - name: reminders
    description: Reminders Module
paths:
  /chats/{CHAT_ID}/reminders:
    get:
      summary: Get reminders in a chat
      operationId: getRemindersInChatV3
      description: |
        Retrieves all reminders set on messages within a specific chat. Use this to list all active reminder alerts across direct messages, group chats, and channels, including single-user and multi-user assigned reminders.
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>
          Wait time before consecutive API requests.
        </p>
        <br><b>Note</b>: This endpoint uses a different base URL: <code>https://cliq.zoho.com/v3</code> (without <code>/api</code>).<br>
        <details style="margin:16px 0 8px 0; border:1px solid rgba(148,163,184,0.5); border-radius:8px; font-family:inherit;" ontoggle="this.querySelector('.err-toggle-hint').textContent=this.open?'Click to collapse':'Click to expand'">
          <summary style="cursor:pointer; padding:11px 16px; font-weight:600; background:rgba(148,163,184,0.1); list-style:none; display:flex; align-items:center; gap:8px; user-select:none; border-radius:8px;">
            <span style="display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:rgba(239,68,68,0.15); border-radius:50%; font-size:12px; font-weight:700; color:#ef4444; flex-shrink:0;">!</span>
            Possible Error Codes
            <span class="err-toggle-hint" style="margin-left:auto; font-weight:400; opacity:0.45; font-size:0.8em; letter-spacing:0.01em;">Click to expand</span>
          </summary>
          <div style="padding:14px 16px 16px 16px;">
            <div style="border-radius:6px; border:1px solid rgba(148,163,184,0.35);">
              <table style="border-collapse:collapse; width:100%; font-family:inherit; font-size:0.9em;">
                <thead>
                  <tr>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); border-right:1px solid rgba(148,163,184,0.35); font-weight:600; width:45%;">Error Code</th>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); font-weight:600; width:55%;">Description</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style="padding:10px 18px; border-right:1px solid rgba(148,163,184,0.25); vertical-align:middle;"><span style="display:inline-block; background:rgba(239,68,68,0.12); color:#ef4444; padding:3px 10px; border-radius:4px; font-family:monospace; font-size:0.82em; line-height:1.6; word-break:break-all;">param_missing</span></td>
                    <td style="padding:10px 18px;">A required parameter is missing. The <code>limit</code> query parameter must be provided.</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div style="background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.4); border-left:4px solid #f59e0b; padding:12px 16px; border-radius:0 6px 6px 0; margin-top:14px; overflow:hidden;">
              <b style="color:#d97706; font-size:0.88em; display:block; margin-bottom:6px;">Error Response Format</b>
              <p style="margin:0 0 8px 0; font-size:0.85em; opacity:0.75;">When an error occurs, the API returns a JSON response in this format:</p>
              <code style="display:block; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:8px 12px; border-radius:4px; font-size:0.75em; word-break:break-all;">{"message": "A human-readable description of the error.", "code": "error_code"}</code>
              <p style="margin:8px 0 0 0; font-size:0.85em; opacity:0.75;">where <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">code</code> is the error identifier (as listed above) and <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">message</code> is a human-readable explanation of what went wrong.</p>
            </div>
          </div>
        </details>
      servers:
        - url: https://cliq.zoho.com/v3
          description: Zoho Cliq US DC (GET reminders)
      tags:
        - reminders
      parameters:
        - name: CHAT_ID
          in: path
          required: true
          description: Unique identifier of the chat or channel. Use this to scope the reminders retrieval to a specific conversation.
          example: CHAT_ID
          schema:
            type: string
        - name: limit
          in: query
          required: true
          description: |
            Number of results per page.<br>
            <b>Maximum limit</b>: 100
          schema:
            type: integer
            maximum: 200
        - name: next_token
          in: query
          required: false
          description: Pagination cursor returned from a previous response. Pass this value to retrieve the next page of results.
          schema:
            type: string
      responses:
        '200':
          description: Reminders retrieved successfully.
          content:
            application/json:
              schema:
                type: object
              examples:
                channel_recurring_reminder:
                  summary: Channel with recurring reminder
                  value:
                    category: chat
                    time: '2026-05-29T03:57:43-07:00'
                    list:
                      - id: '1901318000012651019'
                        time: '2026-05-31T19:30:00-07:00'
                        timezone: Asia/Kolkata
                        content: Weekly Finance Sync
                        completed: false
                        creation_time: '2026-05-29T04:05:57-07:00'
                        creator:
                          name: Priya
                          id: '697322516'
                        users:
                          - name: Priya
                            id: '697322516'
                            completed: false
                            deleted: false
                        message:
                          msgid: '1780052699342'
                          msg: 'Weekly Finance Sync: Review all pending expense approvals and flag any claims older than 7 days for escalation. Ensure the expense tracker is updated before the sync.'
                          chat_id: CT_1424569695482328362_631836344
                          sender_id: '697322516'
                          dname: Priya
                      - id: '1901318000012651010'
                        time: '2026-06-09T21:30:00-07:00'
                        timezone: Asia/Kolkata
                        content: Vendor Payment Review
                        completed: false
                        creation_time: '2026-05-29T03:51:46-07:00'
                        creator:
                          name: Priya
                          id: '697322516'
                        users:
                          - name: Priya
                            id: '697322516'
                            completed: false
                            deleted: false
                        message:
                          msgid: '1780051880491'
                          msg: 'Vendor Payment Review: Review and approve all pending vendor payment requests before the monthly finance sync on June 6.'
                          chat_id: CT_1424569695482328362_631836344
                          sender_id: '697322516'
                          dname: Priya
                group_chat_multi_user_assigned:
                  summary: Group chat with multi-user assigned reminder
                  value:
                    category: chat
                    time: '2026-05-29T03:57:43-07:00'
                    list:
                      - id: '1901318000012651028'
                        time: '2026-06-15T04:30:00-07:00'
                        timezone: Asia/Kolkata
                        content: Action Item followup reminder
                        completed: false
                        creation_time: '2026-05-29T04:08:17-07:00'
                        creator:
                          name: Priya
