              properties:
                reminders:
                  type: array
                  maxItems: 25
                  description: |
                    List of reminder objects to reschedule.<br>
                    <b>Maximum items</b>: 25 per request.
                  items:
                    type: object
                    required:
                      - reminder_id
                      - time
                    properties:
                      reminder_id:
                        type: string
                        description: Unique identifier of the reminder to reschedule.
                      time:
                        type: integer
                        format: int64
                        description: New reminder time in epoch milliseconds.
            examples:
