                    <b>Allowed values</b>:<br>
                    <ul>
                      <li><code>check_in</code>: Delivers the message when the sender checks in.</li>
                      <li><code>check_out</code>: Delivers the message when the sender checks out.</li>
                      <li><code>user_available</code>: Delivers the message when the sender becomes available.</li>
                      <li><code>call_end</code>: Delivers the message when the sender ends a call.</li>
