              <b style="color:#d97706; font-size:0.88em; display:block; margin-bottom:6px;">Error Response Format</b>
              <p style="margin:0 0 8px 0; font-size:0.85em; opacity:0.75;">When an error occurs, the API returns a JSON response in this format:</p>
              <code style="display:block; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:8px 12px; border-radius:4px; font-size:0.75em; word-break:break-all;">{"message": "A human-readable description of the error.", "code": "error_code"}</code>
              <p style="margin:8px 0 0 0; font-size:0.85em; opacity:0.75;">where <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">code</code> is the error identifier (as listed above) and <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">message</code> is a human-readable explanation of what went wrong.</p>
            </div>
          </div>
        </details>
      tags:
        - scheduledmessages
      parameters:
        - name: CHAT_ID
          in: path
          required: true
          description: Unique identifier of the chat or channel. Determines which chat's scheduled messages are targeted for immediate delivery.<br>To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
          example: CHAT_ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - send
                  description: |
                    Operation trigger to send messages immediately.<br>
                    <b>Allowed values</b>:<br>
                    <ul>
                      <li><code>send</code>: Triggers immediate delivery of the specified scheduled message or all pending messages in the chat.</li>
                    </ul>
                id:
                  type: string
                  description: |
                    Unique identifier of a specific scheduled message to send immediately. When provided, only that message is sent.<br>
                    Omit this field and use <code>apply_to</code> instead to send all pending messages.
                apply_to:
                  type: string
                  enum:
                    - all
                  description: |
                    Scope of messages to send when no <code>id</code> is provided.<br>
                    <b>Allowed values</b>:<br>
                    <ul>
                      <li><code>all</code>: Sends all pending scheduled messages in the chat immediately.</li>
                    </ul>
            examples:
              send_specific_message:
                summary: Send a specific message now
                value:
                  status: send
                  id: 76d3978e-b782-4cbb-a98b-670a5a7cbc6e
              send_all_pending_messages:
                summary: Send all pending messages in the chat now
                value:
                  status: send
                  apply_to: all
