                    <ul>
                      <li><code>all_time_based</code>: Targets all time-based scheduled messages that match the <code>time</code> field. Requires <code>time</code> and <code>schedule_time</code>.</li>
                      <li><code>all_status_based</code>: Targets all status-based scheduled messages that match the <code>existing_status</code> field. Requires <code>existing_status</code> and <code>schedule_status</code>.</li>
                    </ul>
                time:
                  type: integer
                  format: int64
                  description: |
