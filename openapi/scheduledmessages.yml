                      <li><code>check_in</code>: Matches messages scheduled to send when the sender checks in.</li>
                      <li><code>check_out</code>: Matches messages scheduled to send when the sender checks out.</li>
                      <li><code>user_available</code>: Matches messages scheduled to send when the sender becomes available.</li>
                      <li><code>call_end</code>: Matches messages scheduled to send when the sender ends a call.</li>
