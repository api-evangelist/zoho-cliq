openapi: 3.0.0
info:
  title: Scheduled Messages
  description: |
    The Scheduled Messages API gets a powerful upgrade with v3, giving developers full lifecycle control over message delivery to build time-aware and context-driven communication workflows. Messages can be composed in advance and delivered automatically based on a scheduled time or a participant's status change, all within the scope of a specific chat.
    <br><br><b>Key Capabilities</b>
    <ul>
      <li><b>List Scheduled Messages:</b> Query all scheduled messages globally or within a specific chat to monitor and audit pending deliveries.</li>
      <li><b>Send Now:</b> Override the scheduled trigger and immediately deliver a single message or all pending messages within a chat.</li>
      <li><b>Bulk Reschedule:</b> Perform a single-operation update to the delivery time or status trigger across all scheduled messages in a chat, enabling scalable schedule management.</li>
      <li><b>Edit Message:</b> Update message content, delivery time, timezone, status-based trigger, or remove an attached file from any individual scheduled message.</li>
      <li><b>Delete:</b> Remove a specific scheduled message or clear the entire scheduled message queue from a chat.</li>
    </ul>
    <br><b>Scheduling Modes</b>
    <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
      <tr>
        <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Mode</th>
        <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Field</th>
        <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Description</th>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>Time-based</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>schedule_time</code> + <code>schedule_timezone</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Delivers at a fixed date and time. Time must be provided in epoch milliseconds.</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>Status-based</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>schedule_status</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Delivers when the sender's status matches a trigger: <code>check_in</code>, <code>check_out</code>, <code>user_available</code>, or <code>call_end</code>.</td>
      </tr>
    </table>
  contact: {}
  version: 1.0.0
externalDocs:
  description: Find out more about Zoho Cliq APIs V3
  url: https://www.zoho.com/cliq/help/restapi/v3/
