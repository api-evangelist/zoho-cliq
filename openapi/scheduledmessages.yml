  /scheduledmessages:
    get:
      summary: List all scheduled messages
      operationId: listAllScheduledMessagesV3
      description: |
        Retrieves all scheduled messages across all chats for the authenticated user. Use this to get a consolidated view of all pending time-based and status-based scheduled messages, with support for pagination and incremental updates.
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>
          Wait time before consecutive API requests.
        </p>
      tags:
        - scheduledmessages
      parameters:
        - name: limit
          in: query
          required: false
          description: |
            Number of results per page. Default is 50.<br>
            <b>Maximum limit</b>: 100
          schema:
            type: integer
            maximum: 200
            default: 50
        - name: next_token
          in: query
          required: false
          description: Pagination cursor returned from a previous response. Pass this value to retrieve the next page of results.
          schema:
            type: string
        - name: sync_token
          in: query
          required: false
          description: Token from a previous response used to fetch only changes since the last sync. Pass this to retrieve only new or updated records instead of the full list.
          schema:
            type: string
      responses:
        '200':
          description: Returns all scheduled messages. Mix of time-based and status-based messages across chats.
          content:
            application/json:
              schema:
                type: object
              examples:
