              - text
            scope: personal
    MessageActionListResponse:
      type: object
      description: Response schema for listing message actions.
      properties:
        deleted:
          type: array
          items:
            type: string
        url:
          type: string
          example: /api/v3/messageactions
        next_token:
          type: string
        type:
          type: string
          example: messageaction
        total_count:
          type: integer
        sync_token:
          type: string
        data:
          type: array
          items:
            type: object
            additionalProperties: true
    MessageActionHandlerResponse:
      type: object
      description: Response schema for message action handler operations.
      properties:
        url:
          type: string
        type:
          type: string
          example: execution_handler
        data:
          type: object
          additionalProperties: true
    HANDLER_TYPE_regex:
      type: string
      description: Type of the message action handler. Message actions support only one handler type&#58; <code>execution_handler</code>, which is triggered when the action is invoked.
      enum:
        - execution_handler
    longid_regex:
      type: string
      description: Numeric long integer identifier used to reference platform components such as Commands, Functions, Widgets, Message Actions, Schedulers, and Extensions.
    v3-msgaction-create:
      type: object
      description: Payload for creating a message action.
      required:
        - name
        - hint
      properties:
        execution_type:
          type: string
          enum:
            - deluge
            - webhook
          description: |
            Defines how the message action executes its handler.<br>
            <ul>
              <li><code>deluge</code>: Handler logic runs on Zoho's platform via Deluge scripts. Default when omitted.</li>
              <li><code>webhook</code>: When the action is triggered, Cliq sends a POST request to your <code>execution_url</code>.</li>
            </ul>
          example: deluge
        execution_url:
          type: string
          maxLength: 225
          description: |
            The URL that Zoho Cliq will POST handler events to when the message action is triggered.<br>
            <b>Required</b> when <code>execution_type</code> is <code>webhook</code>.<br>
            <b>Maximum length</b>: 225 characters.
          example: https://api.yourcompany.com/cliq/messageactions/handler
        name:
          type: string
          maxLength: 30
          description: |
            Name of the message action. This is the text shown to users in the message action menu.<br>
            <b>Maximum length:</b> 30 characters.
        hint:
          type: string
          maxLength: 128
          description: |
            Hint text displayed below the message action name in the menu to provide additional context to users.<br>
            <b>Maximum length:</b> 128 characters.
        scope:
          type: string
          enum:
            - organization
            - team
            - personal
          description: |
            Access level for the message action, determining its visibility and availability to users.<br>
            Allowed values are:<br>
            <ul>
              <li><code>organization</code>: Visible and accessible to all users within the organization.</li>
              <li><code>team</code>: Visible and accessible only to members of specified teams. Requires <a href="/cliq/help/restapi/v3/glossary/#TEAM_ID"><code>team_ids</code></a> field.</li>
              <li><code>personal</code>: Visible and accessible only to the creator, but can be shared with other users by adding them as collaborators.</li>
            </ul>
        team_ids:
          type: array
          maxItems: 4
          description: |
            List of <a href="/cliq/help/restapi/v3/glossary/#TEAM_ID">team_ids</a> that have access to the message action when <code>scope</code> is set to <code>team</code>. Each ID corresponds to a team within the organization.<br>
            <b>Maximum items:</b> 4 team IDs can be specified when <code>scope</code> is <code>team</code>.
          items:
            type: integer
        multi_selectable:
          type: boolean
          description: |
            Determines whether the message action can be applied to multiple messages at once. If set to <code>true</code>, users can select multiple messages and invoke the action on all selected messages simultaneously. If <code>false</code>, the action can only be applied to one message at a time.
        image:
          type: string
          description: |
            Base64-encoded string representing a custom icon image for the message action. This icon is displayed in the message action menu alongside the action name.
        message_types:
          type: array
          minItems: 1
          maxItems: 3
          description: |
            List of message types that the message action supports. This determines which types of messages the action can be applied to. Allowed values are:<br>
            <ul>
              <li><code>text</code>: The action can be applied to text messages.</li>
              <li><code>link</code>: The action can be applied to messages containing links.</li>
              <li><code>attachment</code>: The action can be applied to messages with attachments.</li>
            </ul>
            <b>Minimum items:</b> At least 1 message type must be specified.<br>
          items:
            type: string
            enum:
              - text
              - link
              - attachment
    textpattern_regex:
      type: string
      description: Free-text search string used to filter platform components by name in list and Marketplace search endpoints.
    base64_regex:
      type: string
      description: Base64-encoded pagination or sync token used for cursor-based pagination and incremental data sync.
    pf_component_search_scope_regex:
      type: string
      description: Scope filter for Marketplace search. Accepted values are "organisation" (org-created components) and "marketplace" (published extensions).
    v3-exehandler-edit:
      type: object
      description: Payload for updating the message action execution handler. For Deluge actions, provide `script`. For Webhook actions, provide `permissions`.
      properties:
        script:
          type: string
          description: |
            Updated Deluge script for the execution handler. This script is executed when the message action is invoked by users.<br>
            <b>Maximum size:</b> 250KB.<br>
            <b>Note:</b> Applicable only for <b>Deluge message actions</b>.
        permissions:
          type: array
          maxItems: 5
          description: |
            Updated list of data attributes to forward to your server in the webhook payload.<br>
            <b>Note:</b> Applicable only for <b>Webhook message actions</b>.<br>
            Message action handlers support all 5 permissions.<br>
            <b>Allowed values</b>:
            <ul>
              <li><code>chat</code>: Chat context (chat ID, type, participants).</li>
              <li><code>message</code>: Message content and metadata.</li>
              <li><code>user</code>: Sender's user profile details.</li>
              <li><code>location</code>: Sender's location data.</li>
              <li><code>attachments</code>: Attachment metadata and download info.</li>
            </ul>
          items:
            type: string
            enum:
              - chat
              - message
              - user
              - location
              - attachments
    v3-msgaction-edit:
      type: object
      description: Payload for updating a message action. All fields are optional; only the fields provided will be updated.
      properties:
        execution_url:
          type: string
          maxLength: 225
          description: |
            Updated server URL where Cliq will forward handler events. Applicable only for <b>Webhook message actions</b>.<br>
            This field can be updated independently to redirect the action to a new endpoint.<br>
            <b>Maximum length</b>: 225 characters.
          example: https://api.yourcompany.com/cliq/messageactions/updated-handler
        name:
          type: string
          maxLength: 30
          description: |
            Updated name of the message action shown to users in the message action menu.<br>
            <b>Maximum length:</b> 30 characters.
        hint:
          type: string
          maxLength: 128
          description: |
            Updated hint text displayed below the message action name in the menu to provide additional context to users.<br>
            <b>Maximum length:</b> 128 characters.
        scope:
          type: string
          enum:
            - organization
            - team
            - personal
          description: |
            Updated access level for the message action, determining its visibility and availability to users.<br>
            Allowed values are:<br>
            <ul>
              <li><code>organization</code>: Visible and accessible to all users within the organization.</li>
              <li><code>team</code>: Visible and accessible only to members of specified teams. Requires <a href="/cliq/help/restapi/v3/glossary/#TEAM_ID"><code>team_ids</code></a> field.</li>
              <li><code>personal</code>: Visible and accessible only to the creator, but can be shared with other users by adding them as collaborators.</li>
            </ul>
        team_ids:
          type: array
          maxItems: 4
          description: |
            Updated list of <a href="/cliq/help/restapi/v3/glossary/#TEAM_ID">team_ids</a> that have access to the message action when <code>scope</code> is set to <code>team</code>. Each ID corresponds to a team within the organization.<br>
            <b>Maximum items:</b> 4 team IDs can be specified when <code>scope</code> is <code>team</code>.
          items:
            type: integer
        multi_selectable:
          type: boolean
          description: |
            Updated multi-selection behavior. If set to <code>true</code>, users can select multiple messages and invoke the action on all selected messages simultaneously. If <code>false</code>, the action can only be applied to one message at a time.
        image:
          type: string
          description: |
            Updated Base64-encoded string representing a custom icon image for the message action. This icon is displayed in the message action menu alongside the action name.
        message_types:
          type: array
          minItems: 1
          maxItems: 3
          description: |
            Updated list of message types that the message action supports. Allowed values are:<br>
            <ul>
              <li><code>text</code>: The action can be applied to text messages.</li>
              <li><code>link</code>: The action can be applied to messages containing links.</li>
              <li><code>attachment</code>: The action can be applied to messages with attachments.</li>
            </ul>
            <b>Minimum items:</b> At least 1 message type must be specified.<br>
          items:
            type: string
            enum:
              - text
              - link
              - attachment
      example:
        name: Create Ticket
        hint: Convert this message into a support ticket
        scope: organization
        multi_selectable: false
        message_types:
          - text
          - link
          - attachment
  securitySchemes:
    Cliq_Auth:
      type: oauth2
      x-authorization-example: Bearer 1000.41d9xxxxxxxxxxxxxxxxxxxxxxxxc2d1.8fccxxxxxxxxxxxxxxxxxxxxxxxx125f
      flows:
        implicit:
          authorizationUrl: ''
          scopes:
            ZohoCliq.MessageActions.UPDATE: Update message action configurations and manage message action handlers.
            ZohoCliq.MessageActions.CREATE: Create new custom Message Actions.
            ZohoCliq.MessageActions.READ: Read message action configurations, handlers, and execution logs.
            ZohoCliq.MessageActions.DELETE: Permanently delete Message Actions and their handlers.
