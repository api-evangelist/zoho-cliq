                  type: string
              handlers:
                type: array
              creator:
                type: object
              execution_type:
                type: string
              status:
                type: string
              type:
                type: string
      example:
        url: /api/v3/messageactions
        type: messageaction
        sync_token: NTB8MTc3NzQzMjI3NjY1OHw1MzcxOTAwMDAwMjEyNDAxMA==
        data:
          - multi_selectable: true
            name: Create Ticket
            id: '53719000002124010'
            handlers:
              - type: execution_handler
            creator:
              name: James
