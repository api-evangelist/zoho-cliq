  /bots/{BOT_ID}/handlers:
    post:
      summary: Create a handler for a specific bot
      operationId: create_a_handler_for_a_bot
      description: |
        <a id="create_a_handler_for_a_bot"></a>
        <p>
          Create a handler for a specific bot by providing the handler type and the execution logic for that event.<br>
          Handlers define the bot's behavior for different trigger events. Refer <b><a href="https://www.zoho.com/cliq/help/platform/bots.html">introduction to bot handlers</a></b> in the documentation for more details on each handler type and when it is triggered.
        </p>
        <p>
          The way you define a handler depends on the bot's execution type:
        </p>
        <ul>
          <li><b>Deluge bot</b>: Provide the <code>script</code> attribute containing the Deluge source code to execute when the handler fires.</li>
          <li><b>Webhook bot</b>: Provide the <code>permissions</code> attribute - an array of data attributes that your external server needs to receive in the webhook payload when the handler is triggered. These define what contextual information Zoho Cliq includes in the POST request sent to your <code>execution_url</code>.</li>
        </ul>
        <p><b>Webhook Bots - Using <code>permissions</code></b></p>
        <p>
          For <b>Webhook bots</b>, the <code>permissions</code> array controls what contextual data Zoho Cliq appends to the POST request sent to your server when a handler fires. Only include permissions that are relevant to your server's logic.<br>
          <b>Maximum:</b> 5 permissions per handler.
        </p>
        <p><b>Allowed values for <code>permissions</code></b></p>
        <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
          <tr>
            <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Permission</th>
            <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Data provided to your webhook</th>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>chat</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Chat context (chat ID, type, participants)</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>message</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Message content and metadata</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>user</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Sender's user profile details</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>location</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Sender's location data</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>attachments</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Attachment metadata and download info</td>
          </tr>
        </table>
        <p>
          <b>Permissions availability per handler type</b><br>
          Not all permissions are applicable to every handler. Passing a permission marked <code>-</code> will result in a validation error.
        </p>
        <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
          <tr>
            <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Handler</th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>attachments</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>chat</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>location</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>message</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>user</code></th>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>welcome_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">-</td>
