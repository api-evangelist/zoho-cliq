      parameters:
        - name: BOT_ID
          in: path
          required: true
          description: Unique numeric identifier of the bot. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#BOT_ID">BOT_ID</a> in the Glossary page.
          schema:
            type: string
          example: BOT_ID
      requestBody:
        description: |
          Creates a bot handler. The required fields differ by bot execution type:<br>
          <ul>
            <li><b>Deluge bots</b>: Provide <code>type</code> and <code>script</code> - the Deluge source code to execute when the handler fires.</li>
            <li><b>Webhook bots</b>: Provide <code>type</code> and <code>permissions</code> - an array of data attributes that your external server needs to receive in the webhook payload. Do not pass <code>script</code>.</li>
          </ul>
          For <code>menu_handler</code>, also include <code>name</code> (required) and optionally <code>icon</code>, regardless of execution type.
        content:
          application/json:
            examples:
              message_handler_webhook:
                summary: Message Handler (Webhook bot) - forward chat and user context
                value:
                  type: message_handler
                  permissions:
                    - chat
                    - user
              message_handler_deluge:
                summary: Message Handler (Deluge bot) - intent-based support reply
                value:
                  type: message_handler
                  script: |-
                    response = Map();
                    userMessage = message.get("text").toLowerCase();
                    if(userMessage.contains("ticket")) {
                      response.put("text", "Sure! Please provide a brief description of your issue and I'll raise a ticket right away.");
                    } else if(userMessage.contains("status")) {
                      response.put("text", "Current system status:\n\u2705 API: Operational\n\u2705 Database: Operational\n\u26a0\ufe0f Notifications: Degraded");
                    } else {
                      response.put("text", "I didn't catch that. You can ask me about *status* or type *ticket* to raise a support request.");
                    }
                    return response;
              menu_handler_webhook:
                summary: Menu Handler (Webhook bot) - forward chat and message context
                value:
                  type: menu_handler
                  name: My Menu
                  icon: emoji-name/FF5733
                  permissions:
                    - chat
                    - message
              menu_handler_deluge:
                summary: Menu Handler (Deluge bot) - prompt card to create a support ticket
                value:
                  type: menu_handler
                  name: My Menu
                  icon: emoji-name/FF5733
                  script: |-
                    response = Map();
                    card = Map();
                    card.put("theme", "prompt");
                    card.put("title", "Create a new support ticket for this conversation?");
                    confirmBtn = Map();
                    confirmBtn.put("label", "Create Ticket");
                    confirmAction = Map();
                    confirmAction.put("type", "invoke.function");
                    confirmActionData = Map();
                    confirmActionData.put("name", "create_ticket");
                    confirmAction.put("data", confirmActionData);
                    confirmBtn.put("action", confirmAction);
                    cancelBtn = Map();
                    cancelBtn.put("label", "Cancel");
                    cancelAction = Map();
                    cancelAction.put("type", "invoke.function");
                    cancelActionData = Map();
                    cancelActionData.put("name", "cancel_action");
                    cancelAction.put("data", cancelActionData);
                    cancelBtn.put("action", cancelAction);
                    response.put("card", card);
                    response.put("buttons", {confirmBtn, cancelBtn});
                    return response;
            schema:
              $ref: '#/components/schemas/HandlerCreate'
        required: true
      responses:
        '200':
          description: Bot handler created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotHandlerCreateResponse'
              examples:
                message_handler_webhook:
                  summary: Message Handler (Webhook bot) response
                  value:
                    url: /api/v3/bots/b-53719000001878011/handlers/message_handler
                    type: execution_handler
                    data:
                      type: message_handler
                      id: '53719000001878022'
                      permissions:
                        - chat
                        - user
                message_handler_deluge:
                  summary: Message Handler (Deluge bot) response
                  value:
                    url: /api/v3/bots/b-53719000001878011/handlers/message_handler
                    type: execution_handler
                    data:
                      type: message_handler
                      id: '53719000001878022'
                menu_handler_webhook:
                  summary: Menu Handler (Webhook bot) response
                  value:
                    url: /api/v3/bots/b-53719000001878011/handlers/menu_handler
                    type: execution_handler
                    data:
                      type: menu_handler
                      id: '53719000001878027'
                      display_props:
                        name: My Menu
                        icon: emoji-name/FF5733
                        position: 1
                      permissions:
                        - chat
                        - message
                menu_handler_deluge:
                  summary: Menu Handler (Deluge bot) response
                  value:
                    url: /api/v3/bots/b-53719000001878011/handlers/menu_handler
                    type: execution_handler
                    data:
                      type: menu_handler
                      id: '53719000001878027'
                      display_props:
                        name: My Menu
                        icon: emoji-name/FF5733
                        position: 1
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Bots.UPDATE
      tags:
        - bots
  /bots/{BOT_ID}/handlers/{HANDLER_TYPE}:
    patch:
      summary: Update a handler for a specific bot
      operationId: update_a_handler_for_a_bot
      description: |
        <p>
          Update a handler for a specific bot by providing the handler type and the revised execution logic or configuration to apply for that event.<br>
          Handlers define the bot's behavior for different trigger events. Refer <b><a href="https://www.zoho.com/cliq/help/platform/bots.html">introduction to bot handlers</a></b> in the documentation for more details on each handler type and when it is triggered.
        </p>
        <p>
          What you can update depends on the bot's execution type:
        </p>
        <ul>
          <li><b>Deluge bot</b>: Update the <code>script</code> attribute with the revised Deluge source code to execute when the handler fires.</li>
          <li><b>Webhook bot</b>: Update the <code>permissions</code> attribute - the array of data attributes your external server needs to receive in the webhook payload. This replaces the existing permissions for the handler.</li>
          <li><b>Menu handler (both types)</b>: Update the <code>name</code> and/or <code>icon</code> display properties. Use the optional <code>handler_id</code> query parameter to target a specific variant of a multi-variant menu handler.</li>
        </ul>
        <p>
          <b>Threshold limit</b>: 10 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>
          Wait time before consecutive API requests.
        </p>
        <details style="margin:16px 0 8px 0; border:1px solid rgba(148,163,184,0.5); border-radius:8px; font-family:inherit;" ontoggle="this.querySelector('.err-toggle-hint').textContent=this.open?'Click to collapse':'Click to expand'">
          <summary style="cursor:pointer; padding:11px 16px; font-weight:600; background:rgba(148,163,184,0.1); list-style:none; display:flex; align-items:center; gap:8px; user-select:none; border-radius:8px;">
            <span style="display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:rgba(239,68,68,0.15); border-radius:50%; font-size:12px; font-weight:700; color:#ef4444; flex-shrink:0;">!</span>
            Possible Error Codes
            <span class="err-toggle-hint" style="margin-left:auto; font-weight:400; opacity:0.45; font-size:0.8em; letter-spacing:0.01em;">Click to expand</span>
          </summary>
          <div style="padding:14px 16px 16px 16px;">
            <div style="border-radius:6px; border:1px solid rgba(148,163,184,0.35);">
              <table style="border-collapse:collapse; width:100%; font-family:inherit; font-size:0.9em;">
                <thead>
                  <tr>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); border-right:1px solid rgba(148,163,184,0.35); font-weight:600; width:45%;">Error Code</th>
                    <th style="padding:10px 18px; text-align:center; background:rgba(148,163,184,0.15); border-bottom:1px solid rgba(148,163,184,0.35); font-weight:600; width:55%;">Description</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
