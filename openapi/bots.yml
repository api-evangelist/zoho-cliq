            Encrypted application key for authentication. Required if the bot belongs to an extension. For bots created within the organization, this parameter is not needed.
            <br>To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#EXTENSION_KEY">EXTENSION_KEY</a> in the Glossary page.
          required: false
          schema:
            type: string
      requestBody:
        description: Channel association payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BotAssociateChannelRequest'
        required: true
      responses:
        '200':
          description: Bot successfully associated to channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoResponse'
      security:
        - Cliq_Auth:
            - ZohoCliq.Channels.UPDATE
      tags:
        - bots
  /bots/{BOT_ID_OR_UNIQUE_NAME}/subscribers:
    get:
      summary: List all subscribers of a specific bot
      operationId: list_all_subscribers_of_a_bot
      description: |
        Retrieve a paginated list of users who have subscribed to a specific bot, identified by its bot ID or unique bot name. Access to bot subscribers is limited to the bot creator or the administrator of the organization.<br><br>
        Use <b>limit</b> and <b>next_token</b> for cursor-based pagination. Use <b>sync_token</b> for incremental sync to receive only changes since the last request. 
        <br><br>
        <p>
          <b>Threshold limit</b>: 100 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>Wait time before consecutive API requests.<br>
        </p>
      parameters:
        - name: BOT_ID_OR_UNIQUE_NAME
          in: path
          required: true
          description: |
            Either the numeric bot ID (e.g. <code>b-1901318000009075007</code>) or the bot's unique name (e.g. <code>supportbot</code>).<br>
            To learn more, see <a href="/cliq/help/restapi/v3/glossary/#BOT_ID">BOT_ID</a> or <a href="/cliq/help/restapi/v3/glossary/#BOT_UNIQUE_NAME">BOT_UNIQUE_NAME</a> in the Glossary page.
          schema:
            type: string
          example: BOT_ID_OR_UNIQUE_NAME
        - name: limit
          in: query
          description: Maximum number of subscribers to return.
          required: false
          schema:
            type: integer
        - name: next_token
          in: query
          description: Pagination token to fetch the next set of subscribers.
          required: false
          schema:
            type: string
        - name: sync_token
          in: query
          description: Token to fetch only the subscribers who were added or updated after the previous request was made.
          required: false
          schema:
            type: string
        - name: extension_key
          in: query
          description: |
            Encrypted application key for authentication. Required if the bot belongs to an extension. For bots created within the organization, this parameter is not needed.
            <br>To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#EXTENSION_KEY">EXTENSION_KEY</a> in the Glossary page.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Bot subscriber list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotSubscribersResponse'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
