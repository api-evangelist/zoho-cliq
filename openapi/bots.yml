            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
          </tr>
        </table>
        <p><b>Bot Menu Actions (<code>menu_handler</code>)</b></p>
        <p>
          Both Deluge and Webhook bots support menu handlers, which add quick-action items to the bot's chat menu. When creating a <code>menu_handler</code>, two additional fields apply regardless of execution type:
        </p>
        <ul>
          <li><code>name</code> (required): Label shown in the menu. Max 15 characters.</li>
          <li><code>icon</code> (optional): Icon in <code>{icon-name}/{HEX_COLOR}</code> format. Example: <code>wand/FF5733</code>.</li>
        </ul>
        <p>
          <b>Threshold limit</b>: 10 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>
