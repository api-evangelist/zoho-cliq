      parameters:
        - name: BOT_ID
          in: path
          required: true
          description: Unique numeric identifier of the bot. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#BOT_ID">BOT_ID</a> in the Glossary page.
          schema:
            type: string
          example: BOT_ID
        - name: HANDLER_TYPE
          in: path
          required: true
          description: |
            Type of the handler to be updated. Determines the event or trigger that will use the revised handler script or configuration.<br>
            <b>Allowed values</b>:
            <ul>
              <li><code>welcome_handler</code>: Executes when a user subscribes to the bot.</li>
              <li><code>message_handler</code>: Executes when the bot receives a message.</li>
              <li><code>mention_handler</code>: Executes when the bot is mentioned in a message.</li>
              <li><code>context_handler</code>: Executes based on specific contextual triggers defined by the bot.</li>
              <li><code>participation_handler</code>: Executes when the bot is added to or removed from a channel.</li>
              <li><code>incoming_webhook_handler</code>: Executes when a message is received via an incoming webhook.</li>
              <li><code>menu_handler</code>: Executes when a user interacts with a menu action associated with the bot.</li>
              
