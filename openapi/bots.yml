        description: |
          Updates a bot handler. What you provide depends on the bot's execution type and what you want to change:<br>
          <ul>
            <li><b>Deluge bot</b>: Provide <code>script</code> with the revised Deluge source code.</li>
            <li><b>Webhook bot</b>: Provide <code>permissions</code> with the updated array of data attributes to forward in the webhook payload.</li>
            <li><b>Menu handler</b>: Provide <code>name</code> and/or <code>icon</code> to update the menu action display properties.</li>
          </ul>
