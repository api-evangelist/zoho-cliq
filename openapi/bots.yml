components:
  schemas:
    BotIncomingWebhookRequest:
      type: object
      description: |
        Request body for the incoming webhook endpoint. Accepts any number of custom key-value parameters that are passed directly to the bot's <code>incoming_webhook_handler</code> Deluge script. Up to 50 additional parameters are supported, each with a maximum value length of 10,000 characters. There are no fixed or required fields.
      properties:
        custom_parameters:
          type: object
          description: |
            Pass additional key-value pairs in the request body to provide context to the bot's handler. These parameters are user-defined and can carry any metadata relevant to your integration.
            <br><br>
            <b>Rules for Custom Parameters</b>
            <ul>
              <li>Up to 50 custom parameters are supported per request.</li>
              <li>Each parameter value can be up to 10,000 characters.</li>
              <li>All values must be of type string.</li>
              <li>Parameter keys should be unique to avoid overwriting values in the bot handler.</li>
            </ul>
            <b>Common Use Cases</b>
            <ul>
              <li>Webhook Verification: Some platforms send a challenge_key during webhook registration to confirm that the endpoint is reachable. Your bot handler should echo it back in the response to complete the handshake.</li>
              <li>CI/CD & Monitoring:  Pass parameters like alert_type, build_status, or environment to notify teams about pipeline failures or infrastructure incidents in real time.</li>
              <li>CRM & E-commerce: Send deal updates, order status changes, and customer activity metadata to keep sales and support teams informed without manual intervention.</li>
            </ul>
      additionalProperties:
        type: string
      example:
        alert_type: deployment
        environment: production
        service_name: payment-gateway
        severity: critical
        triggered_by: CI/CD pipeline
    BotIncomingWebhookResponse:
      type: object
      description: Response returned after a successful incoming webhook message delivery. Contains the list of user IDs that received the message.
      properties:
        user_ids:
          type: array
          description: List of user IDs to whom the bot message was successfully delivered.
          items:
            type: string
          example:
            - '55743307'
            - '55622727'
      example:
        user_ids:
          - '55743307'
          - '55622727'
    NoResponse:
      type: object
      description: Represents an empty successful response where no payload is returned.
      properties:
        Response Code:
          type: string
          description: HTTP response code indicating no content is returned.
          example: 204 No response
    BotGetResponse:
      type: object
      description: Response returned when retrieving the details of a specific bot.
      properties:
        url:
          type: string
          description: API endpoint URL for the retrieved bot resource.
          example: /api/v3/bots/b-53719000001878011
        type:
          type: string
          description: Resource type.
          example: bot
        data:
          type: object
          description: Full configuration and details of the bot.
          properties:
            unique_name:
              type: string
              description: Unique identifier of the bot.
              example: supportbot
            name:
              type: string
              description: Display name of the bot.
              example: Support Bot
            id:
              type: string
              description: Numeric ID of the bot.
              example: '53719000001878011'
            description:
              type: string
              description: Description of the bot.
              example: Handles support workflows
            scope:
              type: string
              description: Access level of the bot.
              example: organization
            channel_participation:
              type: array
              description: Channel interaction capabilities of the bot.
              items:
                type: string
              example:
                - listen_message
                - send_message
                - auto_follow_thread
            handlers:
              type: array
              description: Handlers configured for the bot.
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Handler type.
                    example: menu_handler
                  id:
                    type: string
                    description: Unique ID of the handler (present for menu_handler).
                    example: '53719000001878017'
                  name:
                    type: string
                    description: Display name of the menu action (present for menu_handler).
                    example: Action
                  icon:
                    type: string
                    description: Icon reference for the menu action (present for menu_handler).
                    example: wand/627282
                  position:
                    type: integer
                    description: Display position of the menu action (present for menu_handler).
                    example: 1
                  sub_actions:
                    type: array
                    description: Sub-actions under the menu handler.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Sub Action
                        icon:
                          type: string
                          example: wand/627282
            creator:
              type: object
              description: User who created the bot.
              properties:
                name:
                  type: string
                  description: Name of the creator.
                  example: James
                id:
                  type: string
                  description: ZUID of the creator.
                  example: '65113112'
            execution_type:
              type: string
              description: Script execution engine used by the bot.
              example: deluge
            status:
              type: string
              description: Current operational status of the bot.
              example: enabled
            type:
              type: string
              description: Bot category. Always custom for user-created bots.
              example: custom
            default:
              type: boolean
              description: Indicates whether this is the default bot.
              example: false
            subscriber_count:
              type: integer
              description: Number of users subscribed to the bot.
              example: 1
            calls:
              type: string
              description: Indicates whether bot calls are enabled or disabled.
              example: disabled
    BotCreateResponse:
      type: object
      description: Response returned after successfully creating a bot.
      properties:
        url:
          type: string
          description: API endpoint URL for the created bot resource.
          example: /api/v3/bots
        type:
          type: string
          description: Resource type.
          example: bot
        data:
          type: object
          description: The created bot object.
          properties:
            unique_name:
              type: string
              description: System-generated unique identifier for the bot (derived from name, cannot be changed).
              example: clientcarebot
            name:
              type: string
              description: Display name of the bot as provided in the request.
              example: Clientcare Bot
            id:
