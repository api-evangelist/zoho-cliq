    post:
      summary: Mute a chat
      operationId: Mute a chat
      description: |
        Use this API to mute notifications for any given chat while still keeping it accessible.
        Muting is ideal for high-volume group chats or channels where the user wants to stay in the conversation but avoid constant notification interruptions.
        <br><br>
        This setting affects chat-level notifications and helps keep conversations organized without leaving them entirely.
        <br><br>
