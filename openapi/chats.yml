              <b style="color:#d97706; font-size:0.88em; display:block; margin-bottom:6px;">Error Response Format</b>
              <p style="margin:0 0 8px 0; font-size:0.85em; opacity:0.75;">When an error occurs, the API returns a JSON response in this format:</p>
              <code style="display:block; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:8px 12px; border-radius:4px; font-size:0.75em; word-break:break-all;">{"message": "A human-readable description of the error.", "code": "error_code"}</code>
              <p style="margin:8px 0 0 0; font-size:0.85em; opacity:0.75;">where <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">code</code> is the error identifier (as listed above) and <code style="background:rgba(245,158,11,0.1); padding:1px 5px; border-radius:3px;">message</code> is a human-readable explanation of what went wrong.</p>
            </div>
          </div>
        </details>
      requestBody:
        required: true
        content:
          application/json:
            examples:
              read_status_update:
                summary: Mark multiple chats as read
                value:
                  operation: read_status_update
                  read_status: read
                  chats:
                    - chat_id: '2890538000000012345'
                      last_message_id: '1773813859592_51531973059'
                    - chat_id: '2890538000000067890'
                      last_message_id: '1773813860210_51531973060'
              clear_unread:
                summary: Clear unread count for multiple chats
                value:
                  operation: clear_unread
                  chat_ids:
                    - '2890538000000012345'
                    - '2890538000000067890'
            schema:
              $ref: '#/components/schemas/v3-bulk-chat-update-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                read_status_update:
                  summary: Mark as read - success/failure breakdown
                  value:
                    type: chat.read_status
                    data:
                      success:
                        - '2890538000000012345'
                        - '2890538000000067890'
                      failure: []
                clear_unread:
                  summary: Clear unread count
                  value:
                    Response Code: 204 No response
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: chat.read_status
                  data:
                    type: object
                    additionalProperties: true
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
