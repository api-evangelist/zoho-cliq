  /chats/{CHAT_ID}/members:
    get:
      summary: Retrieve members of a chat
      operationId: Retrieve members of a chat
      description: |
        Use this API to retrieve the list of members participating in a channel or group chat.
        <br><br>
        Common use cases:
        <ul>
          <li>Render a participant panel for a channel or group chat in your app UI.</li>
          <li>Show participant identity fields (name, email_id, user_id) using the <code>fields</code> query parameter.</li>
          <li>Audit chat membership before running automations or sending targeted messages.</li>
        </ul>
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>Wait time before consecutive API requests.<br>
        </p>
      parameters:
        - name: CHAT_ID
          in: path
          required: true
          schema:
            type: string
          example: CHAT_ID
          description: The unique identifier of the chat. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
        - name: fields
          in: query
          required: false
          schema:
            type: string
          description: |
            Use this parameter to get details of members participating in the chat.<br>
            <b>Allowed values</b>:
            <ul>
              <li><b>user_id</b> - Unique identifier for the user in Cliq.</li>
              <li><b>email_id</b> - Email address of the user.</li>
              <li><b>name</b> - Display name of the user.</li>
            </ul>
            <br><br>
      responses:
        '200':
          description: The request was successfully completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retrieve-chat-members'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '429':
          description: Too many requests.
