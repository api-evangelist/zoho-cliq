  /commands/{SLASH_COMMAND_ID}/handlers:
    post:
      summary: Create a handler for a specific command
      operationId: createCommandHandler
      description: |
        <a id="createCommandHandler"></a>
        <p>
          Add a new handler to an existing slash command. Commands support two handler types:
        </p>
        <ul>
          <li><b>Execution handler</b>: Executes the command's primary function when invoked.</li>
          <li><b>Suggestion handler</b>: Provides dynamic autocomplete suggestions as users type the command.</li>
        </ul>
        <p>
          The field you provide depends on the command's execution type:
        </p>
        <ul>
          <li><b>Deluge command</b>: Provide the <code>script</code> field with the Deluge source code to execute when the handler fires.</li>
          <li><b>Webhook command</b>: Provide the <code>permissions</code> field - an array of data attributes your server needs to receive in the webhook payload. Do not pass <code>script</code> for Webhook commands.</li>
        </ul>
        <p><b>Permissions availability by handler type</b></p>
        <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
          <tr>
            <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Handler</th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit; white-space: nowrap;"><code>attachments</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>chat</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>location</code></th>
            <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;"><code>user</code></th>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>execution_handler</code></td>
            <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">&#10003;</td>
