          schema:
            $ref: '#/components/schemas/encryptedappkey_regex'
      requestBody:
        description: |
          Inserts a single record into the datastore. Provide field values as key-value pairs in the `values` object, where each key is a field `unique_name` from the datastore schema.
          <br><br>
          <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
