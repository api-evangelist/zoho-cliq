              <th style="padding: 8px; text-align: center; border: 1px solid #ddd;">Field</th>
              <th style="padding: 8px; text-align: center; border: 1px solid #ddd;">Type</th>
              <th style="padding: 8px; text-align: center; border: 1px solid #ddd;">Required</th>
              <th style="padding: 8px; text-align: center; border: 1px solid #ddd;">Constraints</th>
              <th style="padding: 8px; text-align: center; border: 1px solid #ddd;">Description</th>
