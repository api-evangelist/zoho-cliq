          required: false
          description: |
            Expression to filter records. Use field <code>unique_name</code>s as keys. Wrap each condition in parentheses and combine with <code>&&</code> / <code>||</code>.<br>
            Example: <code>(empname=John) && (isactive=true)</code>
            <br>
            <br><b>Supported Comparison Operators</b><br><br>
            <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
              <tr>
                <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Operator</th>
                <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Meaning</th>
                <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Notes</th>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>=</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Equal</td>
                <td style="padding: 8px; border: 1px solid #ddd;"></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>==</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Equal</td>
                <td style="padding: 8px; border: 1px solid #ddd;">Alias for <code>=</code></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>!=</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Not Equal</td>
                <td style="padding: 8px; border: 1px solid #ddd;"></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>&gt;</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Greater Than</td>
                <td style="padding: 8px; border: 1px solid #ddd;"></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>&gt;=</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Greater Than or Equal</td>
                <td style="padding: 8px; border: 1px solid #ddd;"></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>&lt;</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Less Than</td>
                <td style="padding: 8px; border: 1px solid #ddd;"></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>&lt;=</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Less Than or Equal</td>
                <td style="padding: 8px; border: 1px solid #ddd;"></td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>like</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Like (pattern match)</td>
                <td style="padding: 8px; border: 1px solid #ddd;">Case-insensitive, only for CHAR fields</td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>not like</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Not Like</td>
                <td style="padding: 8px; border: 1px solid #ddd;">Case-insensitive, only for CHAR fields</td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>in</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">In (multi-value)</td>
                <td style="padding: 8px; border: 1px solid #ddd;">Comma-separated values, max <b>10</b> values</td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>not in</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Not In</td>
                <td style="padding: 8px; border: 1px solid #ddd;">Comma-separated values, max <b>10</b> values</td>
              </tr>
            </table>
            <br><b>Logical Operators (for combining criteria)</b><br><br>
            <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
              <tr>
                <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Operator</th>
                <th style="padding: 8px; text-align: center; border: 1px solid #ddd; font-family: inherit;">Meaning</th>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>&&</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">AND</td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>||</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">OR</td>
              </tr>
              <tr>
                <td style="padding: 8px; border: 1px solid #ddd;"><code>( )</code></td>
                <td style="padding: 8px; border: 1px solid #ddd;">Grouping / parentheses for precedence</td>
              </tr>
            </table>
            <br><b>AND</b> has higher priority than <b>OR</b> (standard precedence).<br>
            <br><b>Limits</b>
            <ul>
              <li><b>Max criteria clauses</b>: 10 (combined with <code>&&</code> / <code>||</code>)</li>
              <li><b>Max values in <code>in</code> / <code>not in</code></b>: 10</li>
            </ul>
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of records to return.<br>
            <b>Default</b>: 50<br>
            <b>Maximum</b>: 100<br>
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: order_by
          in: query
          required: false
          description: |
            Comma-separated list of fields to sort by, with optional sort direction (asc or desc).<br>
            If sort direction is not specified, ascending order is used by default.<br>
            Example: <code>empname desc, empid asc</code><br>
            <b>Example syntax</b>: +timestamp (e.g. <code>+1777360402254</code>) to get records modified before the specified timestamp, or -age (e.g. <code>-3600000</code>) to get records modified within the last hour.
          schema:
            type: string
        - name: sync_token
          in: query
          required: false
          description: |
            Token to retrieve records modified before a certain point in time. This is useful for incremental synchronization. The token value should be the <code>sync_token</code> returned in a previous response, which encodes a timestamp. Records modified before that timestamp will be returned.<br>
          schema:
            type: string
        - name: next_token
          in: query
          required: false
          description: |
            Token to retrieve records modified after a certain point in time. This is useful for incremental synchronization. The token value should be the <code>sync_token</code> returned in a previous response, which encodes a timestamp. Records modified after that timestamp will be returned.
          schema:
            type: string
        - name: extension_key
          in: query
          required: false
          description: |
            Unique key of the extension that the datastore belongs to. Required if the datastore is owned by an extension. To learn how to retrieve this, see <a href="/cliq/help/restapi/v3/glossary/#EXTENSION_KEY">EXTENSION_KEY</a> in the Glossary page.
          schema:
            type: string
      responses:
        '200':
          description: Records returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listrecords_response'
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - DatastoreRecords.READ
      tags:
        - Platform_storage
    delete:
      summary: Delete records from a datastore
      operationId: delete_records_of_given_ids_in
      description: |
        Delete one or more records from a datastore. Specify the records to delete by providing comma-separated record <code>ids</code> in the query string, or by providing a <code>criteria</code> expression to match records. Deletions are irreversible.
        <br><br>
        <blockquote><b>Note</b>: To manage records of a datastore bundled with an extension, use the extension-scoped endpoint instead:<br><code>v3/extensions/{EXTENSION_ID}/datastores/{DATASTORE_UNIQUE_NAME}/records</code><br>and pass the <code>extension_key</code> as a query parameter.</blockquote>
        <br><br>
        <p>
          <b>Threshold limit</b>: 30 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 5 minutes<br>Wait time before consecutive API requests.<br>
        </p>
      parameters:
        - name: DATASTORE_UNIQUE_NAME
          in: path
          required: true
          description: Unique name of the datastore. To learn how to retrieve this, see <a href="/cliq/help/restapi/v3/glossary/#DATABASE_UNIQUE_NAME">DATABASE_UNIQUE_NAME</a> in the Glossary page.
          schema:
            type: string
          example: DATASTORE_UNIQUE_NAME
        - schema:
            description: ''
            type: string
          in: query
          name: criteria
          description: |
            Expression to select records for bulk deletion. Use field <code>unique_name</code>s as keys. Supported comparison operators: <code>=</code>, <code>==</code>, <code>!=</code>, <code>&gt;</code>, <code>&gt;=</code>, <code>&lt;</code>, <code>&lt;=</code>, <code>like</code>, <code>not like</code>, <code>in</code> (max 10 values), <code>not in</code> (max 10 values). Combine conditions with <code>&&</code> (AND) or <code>||</code> (OR), and use parentheses for grouping. Max 10 clauses.
          required: false
        - schema:
            description: ''
            $ref: '#/components/schemas/multiplelong_regex'
          in: query
          name: ids
          description: ids of the records to be deleted
          required: false
        - schema:
            description: ''
            $ref: '#/components/schemas/encryptedappkey_regex'
          in: query
          name: extension_key
          description: Encrypted app id
          required: false
      responses:
        '204':
          description: No Content. Records deleted successfully.
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '406':
          description: Not Acceptable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The response has been received but the requested response type is not supported by the browser.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
