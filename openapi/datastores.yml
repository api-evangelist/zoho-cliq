                    empid: 1001
                    isactive: true
                    notes: Senior Engineer in Platform Team
        required: true
      responses:
        '200':
          description: Record inserted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: /api/v3/datastores/empdir/records
                  type:
                    type: string
                    example: datastore_record
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '227828000000128010'
                      empname:
                        type: string
                        example: John Doe
                      empid:
                        type: string
                        example: '1001'
                      isactive:
                        type: boolean
                        example: true
                      notes:
                        type: string
                        example: Senior Engineer in Platform Team
                      added_time:
                        type: string
                        example: '1777360402254'
                      modified_time:
                        type: string
                        example: '1777360402254'
              example:
                url: /api/v3/datastores/empdir/records
                type: datastore_record
                data:
                  modified_time: '1777360402254'
                  empid: '1001'
                  isactive: true
                  id: '227828000000128010'
                  empname: John Doe
                  added_time: '1777360402254'
                  notes: Senior Engineer in Platform Team
