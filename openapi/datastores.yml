        <ul>
          <li>Use the <code>criteria</code> query parameter to filter records based on field values (e.g. <code>(empname=John) && (isactive=true)</code>).</li>
          <li>Use the <code>sync_token</code> parameter to retrieve records modified before a certain point in time, or the <code>next_token</code> parameter for records modified after a certain point in time. This is useful for incremental synchronization.</li>
          <li>Use the <code>order_by</code> parameter to sort results by specific fields.</li>
          <li>Use the <code>limit</code> parameter to restrict the number of records returned.</li>
        </ul>
