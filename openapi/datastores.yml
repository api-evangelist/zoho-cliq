              <td style="padding: 8px; border: 1px solid #ddd;">Yes</td>
              <td style="padding: 8px; border: 1px solid #ddd;">Max 20 keys; each value max 1000 chars; total max 2500 bytes</td>
              <td style="padding: 8px; border: 1px solid #ddd;">Key-value pairs where keys are field <code>unique_name</code>s defined in the datastore schema.</td>
            </tr>
          </table>
        content:
          application/json:
            schema:
              type: object
              required:
                - values
              properties:
                values:
                  type: object
                  description: |
                    Key-value pairs representing field data for the new record.<br>
                    Keys must match the <code>unique_name</code> of fields defined in the datastore schema. Values must conform to the field type (e.g. string, number, boolean) and respect the datastore's constraints.<br>
                    <br>
                    <b>Datastore constraints:</b><br>
                    <ul>
                      <li>Maximum 20 fields per record</li>
                      <li>Each value can be up to 1000 characters</li>
                      
                    </ul>
                  additionalProperties: true
                  example:
