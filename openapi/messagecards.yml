openapi: 3.0.0
info:
  title: Message Cards
  description: |
    Message Cards are structured, interactive message formats in Zoho Cliq that go beyond plain text to deliver rich, engaging content inside conversations.
    They are used to present polls, inline data displays, and interactive prompts directly within a chat or channel, enabling bots and integrations to collect input, display structured information, and drive actions from users without leaving the conversation.
    <br><br>
    Message Cards are sent as part of the standard <b>Post Message</b> payload by setting the <code>card</code> object inside the message body. The <code>theme</code> field inside <code>card</code> determines which card type is rendered.
    <br><br>
    Not sure how to structure your card? Use the Message Builder to visually design and preview your card payload before integrating.
    <br><br>
    <a href="https://cliq.zoho.com/messagebuilder" target="_blank" class="btn-primary">Try Message Builder</a>
    <br><br>
    <b id="available-themes">Available Themes</b><br><br>
    <table style="border-collapse: collapse; width: 100%; font-family: inherit;">
      <tr>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Theme</th>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Description</th>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Required fields</th>
        <th style="padding: 8px; text-align: left; border: 1px solid #ddd; font-family: inherit;">Optional fields</th>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>poll</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Renders a poll card that lets users vote on one or more options. Tracks and displays live vote counts and percentages.</td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>theme</code>, <code>title</code>, <code>options</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">-</td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>modern-inline</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Renders a rich inline card with a header, sections of labeled fields, and optional action buttons. Pair with <code>slides</code> for supporting data.</td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>theme</code>, <code>title</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>thumbnail</code>, <code>sections</code>, <code>buttons</code></td>
      </tr>
      <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>prompt</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">Renders a focused prompt card with a question and a set of quick-reply or action buttons for the user to respond to.</td>
        <td style="padding: 8px; border: 1px solid #ddd;"><code>theme</code>, <code>title</code>, <code>buttons</code></td>
        <td style="padding: 8px; border: 1px solid #ddd;">-</td>
      </tr>
    </table>
    <br>
    <b>How Message Cards work</b>
    <ul>
      <li>Cards are embedded in the message payload using the <code>card</code> object.</li>
      <li>The <code>theme</code> field selects the rendering template.</li>
      <li>Interactive elements such as buttons and poll options are defined inside the <code>card</code> object.</li>
      <li>Supporting structured content such as tables and lists is added via the top-level <code>slides</code> array, which sits alongside <code>card</code> in the payload and is not nested inside it.</li>
      <li>In V3, Message Cards are currently supported via chat conversations using <code>POST /chats/{CHAT_ID}/messages</code>.</li>
    </ul>
  contact: {}
  version: 1.0.0
externalDocs:
  description: Find out more about Zoho Cliq APIs V3
  url: https://www.zoho.com/cliq/help/restapi/v3/
servers:
  - url: https://cliq.zoho.com/api/v3
    description: Zoho Cliq US Data Centre
tags:
  - name: messagecards
    description: APIs for sending structured interactive message cards (Poll, Modern Inline, and Prompt) inside Zoho Cliq conversations.
paths:
  /channels/{CHANNEL_UNIQUE_NAME}/message:
    post:
      summary: Post a message card to a channel
      operationId: postMessageCardToChannel
      description: |
        Send a structured Message Card to a specific channel. Use this to deliver polls, inline data cards, or approval prompts into a channel conversation. The <code>card</code> object in the request body varies depending on the card type: <code>poll</code>, <code>modern-inline</code>, or <code>prompt</code>.
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>
          Wait time before consecutive API requests.
        </p>
      tags:
        - messagecards
      parameters:
        - name: CHANNEL_UNIQUE_NAME
          in: path
          required: true
          description: The unique name of the channel to post the message card into. To learn how to retrieve this, see <a href="/cliq/help/restapi/v3/glossary/#CHANNEL_UNIQUE_NAME">CHANNEL_UNIQUE_NAME</a> in the Glossary page.
          example: CHANNEL_UNIQUE_NAME
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - card
              properties:
                text:
                  type: string
                  description: |
                    Fallback plain-text label displayed above the card or in notification previews where cards are not rendered.<br>
                    Used in: <b>Poll</b>, <b>Modern Inline</b>, and <b>Prompt</b> cards.
                card:
                  $ref: '#/components/schemas/CardObject'
                slides:
                  $ref: '#/components/schemas/Slides'
            examples:
              poll_card:
                summary: Poll Card - Sprint priority vote
                value:
                  text: Sprint 42 - Please vote on which feature we prioritize this cycle.
                  card:
                    theme: poll
                    title: Which feature should we prioritize in Sprint 42?
                    options:
                      - text: OAuth 2.0 support for third-party integrations
                      - text: Bulk export for audit logs
                      - text: Dark mode for the web app
                      - text: Push notifications for mobile
              modern_inline_card:
                summary: Modern Inline Card - Support ticket escalation
                value:
                  text: A critical support ticket has been escalated and requires immediate attention.
                  card:
                    theme: modern-inline
                    title: Ticket Escalated - Payment Gateway Timeout
                    buttons:
                      - label: Assign to Me
                        action:
                          type: invoke.function
                          data:
                            name: assign_ticket
                      - label: View Ticket
                        action:
                          type: open.url
                          data:
                            web: https://desk.zoho.com/tickets/TKT-00892
                  slides:
                    - type: table
                      title: Ticket Details
                      data:
                        headers:
                          - Field
                          - Value
                        rows:
                          - Field: Ticket ID
                            Value: '#TKT-00892'
                          - Field: Priority
                            Value: Critical
                          - Field: Reported By
                            Value: olivia.palmer@zylker.com
                          - Field: Affected Module
                            Value: Payment Gateway
                          - Field: Open Since
                            Value: 2026-04-16 09:14 AM
              prompt_card:
                summary: Prompt Card - Deployment approval request
                value:
                  text: Deployment approval required for release v3.6.1 to production.
                  card:
                    theme: prompt
                    title: Approve deployment of v3.6.1 to production? This release includes 4 bug fixes and 1 migration script.
                    buttons:
                      - label: Approve
                        action:
                          type: invoke.function
                          data:
                            name: approve_deployment
                      - label: Reject
                        action:
                          type: invoke.function
                          data:
                            name: reject_deployment
                      - label: View Diff
                        action:
                          type: open.url
                          data:
                            web: https://git.zylker.com/releases/v3.6.1/diff
      responses:
        '200':
          description: Message card posted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                poll_card:
                  summary: Poll Card response
                  value:
                    url: /api/v3/channels/engineering/message
                    type: message
                    data:
                      id: '1701234567890_1234567890'
                      card:
                        theme: poll
                        title: Which feature should we prioritize in Sprint 42?
                        options:
                          - text: OAuth 2.0 support for third-party integrations
                            votes: 0
                          - text: Bulk export for audit logs
                            votes: 0
                          - text: Dark mode for the web app
                            votes: 0
                          - text: Push notifications for mobile
                            votes: 0
                modern_inline_card:
                  summary: Modern Inline Card response
                  value:
                    url: /api/v3/channels/support/message
                    type: message
                    data:
                      id: '1701234567891_1234567891'
                      card:
                        theme: modern-inline
                        title: Ticket Escalated - Payment Gateway Timeout
                      slides:
                        - type: table
                          title: Ticket Details
                          data:
                            headers:
                              - Field
                              - Value
                            rows:
                              - Field: Ticket ID
                                Value: '#TKT-00892'
                              - Field: Priority
                                Value: Critical
                prompt_card:
                  summary: Prompt Card response
                  value:
                    url: /api/v3/channels/devops/message
                    type: message
                    data:
                      id: '1701234567892_1234567892'
                      card:
                        theme: prompt
                        title: Approve deployment of v3.6.1 to production?
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The request cannot be performed. Usually because of malformed parameter or missing parameter.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request was rejected because of invalid AuthToken.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The user does not have enough permission or possibly not an user of the respective organization to access the resource.
        '404':
          description: Invalid URL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL you've sent is wrong. It's possible that the resource you've requested has been moved to another URL.
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested resource does not support the HTTP method used. For example, requesting List of all customers API with PUT as the HTTP method.
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many requests within a certain time frame.
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cliq server encountered an error which prevents it from fulfilling the request.
      security:
        - Cliq_Auth:
            - ZohoCliq.Channels.CREATE
  /chats/{CHAT_ID}/messages:
    post:
      summary: Post a message card to a chat
      operationId: postMessageCardToChat
      description: |
        Send a structured Message Card into any chat conversation. Use this to deliver polls, inline data cards, or approval prompts into a direct message, group chat, or channel conversation. The <code>card</code> object in the request body varies depending on the card type: <code>poll</code>, <code>modern-inline</code>, or <code>prompt</code>.
        <br><br>
        Recommended for bot and agentic workflows where the target conversation is resolved dynamically at runtime.
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>
          Wait time before consecutive API requests.
        </p>
      tags:
        - messagecards
      parameters:
        - name: CHAT_ID
          in: path
          required: true
          description: Unique identifier of the chat where the message card should be posted. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#CHAT_ID">CHAT_ID</a> in the Glossary page.
          example: CHAT_ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - card
              properties:
                text:
                  type: string
                  description: |
                    Fallback plain-text label displayed above the card or in notification previews where cards are not rendered.<br>
                    Used in: <b>Poll</b>, <b>Modern Inline</b>, and <b>Prompt</b> cards.
                card:
                  $ref: '#/components/schemas/CardObject'
                slides:
