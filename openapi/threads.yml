  /chats/{THREAD_CHAT_ID}/members:
    get:
      summary: Retrieve members of a thread
      operationId: Retrieve members of a thread
      description: |
        Use this API to fetch participants of a specific thread conversation.
        This is useful when you want to display who is currently involved in a focused topic discussion without scanning the parent channel.
        <br><br>
        Common use cases:
        <ul>
          <li>Render a thread participant panel in your app UI.</li>
          <li>Show participant identity fields (name, email_id, user_id) using the <code>fields</code> query parameter.</li>
          <li>Audit collaboration context before automations post follow-up replies in the same thread.</li>
        </ul>
        <br><br>
        <p>
          <b>Threshold limit</b>: 20 requests per min per user<br>
          Number of API calls allowed within a minute.<br><br>
          <b>Lock period</b>: 10 minutes<br>Wait time before consecutive API requests.<br>
        </p>
      parameters:
        - name: THREAD_CHAT_ID
          in: path
          required: true
          schema:
            type: string
          example: THREAD_CHAT_ID
          description: The ID of the thread from which members need to be retrieved. To learn how to retrieve this ID, see <a href="/cliq/help/restapi/v3/glossary/#THREAD_CHAT_ID">THREAD_CHAT_ID</a> in the Glossary page.
        - name: fields
          in: query
          required: false
          schema:
            type: string
          description: |
            Use this parameter to get details of members participating in the thread.<br>
            <b>Allowed values</b>:
            <ul>
              <li><b>user_id</b> - Unique identifier for the user in Cliq.</li>
              <li><b>email_id</b> - Email address of the user.</li>
              <li><b>name</b> - Display name of the user.</li>
            </ul>
            <br><br>
      responses:
        '200':
          description: The request was successfully completed.
