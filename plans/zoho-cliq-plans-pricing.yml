      - name: Slash commands
        value: 5000
        unit: per organization
      - name: Functions
        value: 5000
        unit: per organization
      - name: Keyboard shortcuts per user
        value: 50
        unit: shortcuts
      - name: Message deletion
        value: 730
        unit: days
    features:
      - All Professional features
      - Audit history
      - Advanced usage reports
      - eDiscovery and DRP
      - Data Loss Prevention (DLP)
      - Custom retention policies
